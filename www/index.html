<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#07111e;font-family:'DM Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:rgba(255,255,255,0.9);overscroll-behavior:none;touch-action:manipulation}
button{font-family:inherit;outline:none;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
.scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;height:100%}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.theme-transition,.theme-transition *{transition:background-color 0.38s ease,color 0.28s ease,border-color 0.32s ease,box-shadow 0.35s ease !important}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.82) translateY(12px)}65%{transform:scale(1.04) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes floatDot{0%{opacity:0.8;transform:translate(var(--tx),var(--ty)) scale(1)}100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.3)}}
@keyframes countPop{0%{opacity:0;transform:scale(0.7)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes calDotIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes streakPulse{0%,100%{opacity:1}50%{opacity:0.72}}

.fade-up{animation:fadeUp 0.40s cubic-bezier(0.4,0,0.2,1) both}
.fade-down{animation:fadeDown 0.30s ease both}
.scale-in{animation:scaleIn 0.28s cubic-bezier(0.4,0,0.2,1) both}
.pop-in{animation:popIn 0.45s cubic-bezier(0.34,1.2,0.64,1) both}
.slide-up{animation:slideUp 0.36s cubic-bezier(0.4,0,0.2,1) both}

.tap{-webkit-tap-highlight-color:transparent;cursor:pointer;transition:opacity 0.15s ease}
.tap:active{opacity:0.6}
.btn-p{cursor:pointer;transition:transform 0.14s ease,opacity 0.14s ease}
.btn-p:hover{transform:translateY(-1px)}
.btn-p:active{transform:scale(0.97);opacity:0.88}
.btn-s{cursor:pointer;transition:opacity 0.18s ease}
.btn-s:hover{opacity:0.65}
.btn-s:active{opacity:0.4}
.nav-btn{-webkit-tap-highlight-color:transparent;transition:opacity 0.15s ease}
.nav-btn:active{opacity:0.4}
.tech-chip{cursor:pointer;transition:all 0.18s cubic-bezier(0.4,0,0.2,1);-webkit-tap-highlight-color:transparent}
.tech-chip:active{transform:scale(0.95)}
.app-row{transition:background 0.15s ease}
.app-row:active{opacity:0.7}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:floatDot 1.5s ease-out forwards}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── Device helpers ────────────────────────────────────────────────────────────
function openApp(app){

  const t=Date.now();

  setTimeout(()=>{ if(Date.now()-t<1500) window.open(app.url,'_blank'); },800);
}
function openScreenTimeSettings(){
  const ua=navigator.userAgent;
  if(/iPhone|iPad|iPod/.test(ua)) window.location.href='App-Prefs:root=SCREENTIME';
  else if(/Android/.test(ua)) window.location.href='intent:#Intent;action=android.settings.DIGITAL_WELLBEING;end';
  else window.open('https://support.apple.com/en-us/HT208982','_blank');
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let _ctx=null,_ag=null,_ao=[];
const getCtx=()=>{if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;};
function playBell(f){try{const ctx=getCtx(),t=ctx.currentTime,o=ctx.createOscillator(),e=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.72,t+1.6);e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(0.11,t+0.04);e.gain.exponentialRampToValueAtTime(0.001,t+1.9);o.connect(e);e.connect(ctx.destination);o.start(t);o.stop(t+1.9);}catch(e){}}
const phaseSound=l=>playBell({Inhale:528,Hold:396,Exhale:432}[l]||528);
function startAmbient(){try{stopAmbient();const ctx=getCtx(),m=ctx.createGain();m.gain.setValueAtTime(0,ctx.currentTime);m.gain.linearRampToValueAtTime(0.028,ctx.currentTime+2.5);m.connect(ctx.destination);_ag=m;_ao=[];[[110,1],[220.12,0.28],[165.06,0.18]].forEach(([f,g])=>{const o=ctx.createOscillator(),gn=ctx.createGain();o.type='sine';o.frequency.value=f;gn.gain.value=g;o.connect(gn);gn.connect(m);o.start();_ao.push(o);});}catch(e){}}
function stopAmbient(){try{if(_ag&&_ctx){_ag.gain.linearRampToValueAtTime(0,_ctx.currentTime+1.2);const o=[..._ao];setTimeout(()=>o.forEach(x=>{try{x.stop();}catch(e){}}),1400);_ao=[];_ag=null;}}catch(e){}}

// ── Storage ───────────────────────────────────────────────────────────────────
const SK='breathe_v6';
const DEF={sessions:[],totalMin:0,earnedMin:0,spentMin:0,appEarned:{},appLimits:{},appEnabled:{instagram:true,tiktok:true,youtube:false,twitter:false},premium:{paid:false,trial:false,trialStart:null},reminder:{enabled:false,time:'08:00'},theme:'dark'};
const loadData=()=>{try{return{...DEF,...JSON.parse(localStorage.getItem(SK))};}catch(e){return{...DEF};}};
const saveData=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}};
const todayStr=()=>new Date().toISOString().slice(0,10);
const calcStreak=s=>{const days=[...new Set(s.map(x=>x.date))].sort().reverse();if(!days.length||days[0]!==todayStr())return 0;let n=1;for(let i=1;i<days.length;i++){if(Math.round((new Date(days[i-1])-new Date(days[i]))/86400000)===1)n++;else break;}return n;};
const last7=sessions=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const date=d.toISOString().slice(0,10);return{date,label:d.toLocaleDateString('en',{weekday:'narrow'}),isToday:i===6,count:sessions.filter(s=>s.date===date).length};});
const isPremActive=p=>p.paid||(p.trial&&p.trialStart&&(Date.now()-new Date(p.trialStart))/86400000<7);
const trialLeft=p=>!p.trial||!p.trialStart?0:Math.max(0,7-Math.floor((Date.now()-new Date(p.trialStart))/86400000));
const nextStep=(v,dir)=>{const i=LIMIT_STEPS.indexOf(v);if(i===-1)return dir>0?LIMIT_STEPS[1]:LIMIT_STEPS[0];return LIMIT_STEPS[Math.max(0,Math.min(LIMIT_STEPS.length-1,i+dir))];};

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtHHMM=m=>{const h=Math.floor(m/60),mn=m%60;return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;};
function orbProps(l,dur,ld){if(l==='Inhale')return{scale:1.26,glow:0.72,dur};if(l==='Exhale')return{scale:0.68,glow:0.10,dur};return ld==='in'?{scale:1.26,glow:0.50,dur:0.45}:{scale:0.68,glow:0.07,dur:0.45};}
function glowShadow(a,g){const h=n=>Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');return`0 0 ${Math.round(g*52)}px ${a}${h(g*210)},0 0 ${Math.round(g*96)}px ${a}${h(g*65)}`;}

// ── Shared components ─────────────────────────────────────────────────────────

function PremiumModal({th,hasTrial,onClose,onTrial,onBuy}){

      <div style={{width:'40px',height:'4px',borderRadius:'2px',background:th.text4,margin:'0 auto 28px'}}/>
      <div style={{textAlign:'center',marginBottom:'22px'}}>

      <button className="btn-p" onClick={onBuy} style={{width:'100%',background:hasTrial?'linear-gradient(135deg,#a48ee8,#5ec4e0)':th.text4,border:hasTrial?'none':`1px solid ${th.border}`,borderRadius:'14px',padding:'15px',color:hasTrial?'#fff':th.text2,fontSize:'15px',fontWeight:600,marginBottom:'12px',boxShadow:hasTrial?'0 6px 24px rgba(164,142,232,0.4)':'none'}}>{hasTrial?'upgrade — $4.99/mo':'$4.99/month  ·  $29.99/year'}</button>
      <p style={{color:th.label,fontSize:'11px',textAlign:'center'}}>cancel anytime · no ads</p>
    </div>
  </div>;
}

// ── ReminderSheet ─────────────────────────────────────────────────────────────
function ReminderSheet({th,reminder,onSave,onClose}){
  const[on,setOn]=useState(reminder.enabled);
  const[t,setTime]=useState(reminder.time||'08:00');

      <div style={{width:'40px',height:'4px',borderRadius:'2px',background:th.text4,margin:'0 auto 24px'}}/>

// ── SessionComplete ───────────────────────────────────────────────────────────
function SessionComplete({th,tech,cycles,minutes,onContinue}){
  const earned=minutes*10;
  return<div style={{position:'fixed',inset:0,background:th.overlay,display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:'24px',animation:'overlayIn 0.28s ease'}}>

      <div style={{width:'56px',height:'56px',borderRadius:'50%',margin:'0 auto 16px',background:`linear-gradient(135deg,${tech.accent}22,${tech.accent}44)`,border:`2px solid ${tech.accent}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px'}}>✦</div>

    </div>

// ── SessionScreen ─────────────────────────────────────────────────────────────
function SessionScreen({th,tech,onDone,onBack,sound}){
  const[running,setRunning]=useState(false);
  const[phaseIdx,setPhaseIdx]=useState(0);
  const[count,setCount]=useState(tech.phases[0].d);
  const[cycles,setCycles]=useState(0);
  const[lastDir,setLastDir]=useState('neutral');
  const[particles,setParticles]=useState([]);
  const[showComp,setShowComp]=useState(false);
  const[sessMin,setSessMin]=useState(1);
  const startRef=useRef(null);const pid=useRef(0);

  const phase=tech.phases[phaseIdx];
  const orb=running?orbProps(phase.l,phase.d,lastDir):{scale:0.82,glow:0.14,dur:0.9};
  const isHold=running&&phase.l==='Hold';

  useEffect(()=>{if(!running||phase.l!=='Inhale')return;const iv=setInterval(()=>{const id=++pid.current;const angle=Math.random()*360;const r=90+Math.random()*35;const tx=`${Math.cos(angle*Math.PI/180)*r}px`;const ty=`${Math.sin(angle*Math.PI/180)*r}px`;const tx2=`${Math.cos(angle*Math.PI/180)*(r+30)}px`;const ty2=`${Math.sin(angle*Math.PI/180)*(r+30)}px`;const sz=2+Math.random()*3;setParticles(p=>[...p.slice(-10),{id,tx,ty,tx2,ty2,sz}]);setTimeout(()=>setParticles(p=>p.filter(x=>x.id!==id)),1600);},380);return()=>clearInterval(iv);},[running,phaseIdx]);

  useEffect(()=>{if(!running)return;const p=tech.phases[phaseIdx];if(p.l==='Inhale')setLastDir('in');else if(p.l==='Exhale')setLastDir('out');if(sound)phaseSound(p.l);setCount(p.d);let c=p.d;const iv=setInterval(()=>{c--;setCount(c);if(c<=0)clearInterval(iv);},1000);const tm=setTimeout(()=>{const next=(phaseIdx+1)%tech.phases.length;if(next===0)setCycles(n=>n+1);setPhaseIdx(next);},p.d*1000);return()=>{clearInterval(iv);clearTimeout(tm);};},[phaseIdx,running]);

  useEffect(()=>()=>stopAmbient(),[]);

  const handleStart=()=>{startRef.current=Date.now();setRunning(true);if(sound)startAmbient();};
  const handleEnd=()=>{stopAmbient();setRunning(false);const m=Math.max(1,Math.round((Date.now()-(startRef.current||Date.now()))/60000));setSessMin(m);setShowComp(true);};

      <div style={{position:'absolute',width:'360px',height:'360px',borderRadius:'50%',background:`radial-gradient(circle,${tech.accent}07 0%,transparent 70%)`,transform:`scale(${running?orb.scale*1.55:1.1})`,transition:`transform ${orb.dur}s ease`,pointerEvents:'none'}}/>
      {[[290,1.16,0.16],[240,1.07,0.28]].map(([sz,sm,om],i)=>(
        <div key={i} style={{position:'absolute',width:`${sz}px`,height:`${sz}px`,borderRadius:'50%',border:`1px solid ${tech.accent}`,opacity:running?orb.glow*om:0.04,transform:`scale(${running?orb.scale*sm:1})`,transition:`opacity ${isHold?0.45:orb.dur}s ease,transform ${isHold?0.45:orb.dur}s ease`,pointerEvents:'none'}}/>

      {particles.map(p=><div key={p.id} className="particle" style={{width:`${p.sz}px`,height:`${p.sz}px`,background:tech.accent,opacity:0.65,'--tx':p.tx,'--ty':p.ty,'--tx2':p.tx2,'--ty2':p.ty2,top:`calc(50% - ${p.sz/2}px)`,left:`calc(50% - ${p.sz/2}px)`}}/>)}
      <div style={{width:'200px',height:'200px',borderRadius:'50%',border:`1.5px solid ${tech.accent}${running?'cc':'40'}`,background:`radial-gradient(circle at 38% 32%,${tech.accent}26,${tech.accent}07 55%,transparent)`,transform:`scale(${orb.scale})`,transition:`transform ${isHold?0.45:orb.dur}s cubic-bezier(0.4,0,0.2,1),box-shadow ${isHold?0.45:orb.dur}s ease,border-color 0.4s ease`,boxShadow:glowShadow(tech.accent,orb.glow),display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',zIndex:1}}>

        {running&&<p key={count} style={{fontSize:'46px',fontWeight:300,color:tech.accent,letterSpacing:'-0.04em',lineHeight:1,animation:'countPop 0.3s cubic-bezier(0.34,1.3,0.64,1) both'}}>{count}</p>}
      </div>
      {running&&<div style={{marginTop:'28px',display:'flex',gap:'8px',alignItems:'center'}}>
        {tech.phases.map((p,i)=><div key={i} style={{width:i===phaseIdx?'28px':'7px',height:'7px',borderRadius:'4px',background:i===phaseIdx?tech.accent:'rgba(255,255,255,0.12)',transition:'all 0.38s cubic-bezier(0.34,1.3,0.64,1)'}}/>)}
      </div>}
      {running&&<div style={{marginTop:'16px',display:'flex',gap:'20px'}}>
        {tech.phases.map((p,i)=><div key={i} style={{textAlign:'center',opacity:i===phaseIdx?1:0.22,transition:'opacity 0.35s ease'}}>
          <p style={{color:'rgba(255,255,255,0.85)',fontSize:'10px',marginBottom:'2px'}}>{p.l}</p>
          <p style={{color:tech.accent,fontSize:'10px'}}>{p.d}s</p>
        </div>)}
      </div>}
      {running&&cycles>0&&<div className="fade-down" style={{marginTop:'16px'}}>
        <div style={{background:`${tech.accent}18`,border:`1px solid ${tech.accent}40`,borderRadius:'20px',padding:'5px 14px'}}>
          <span style={{color:tech.accent,fontSize:'12px',fontWeight:600}}>✦ {cycles} cycle{cycles!==1?'s':''} complete</span>
        </div>
      </div>}
    </div>
    <div style={{padding:'0 24px 52px',display:'flex',flexDirection:'column',alignItems:'center',gap:'12px'}}>
      {!running&&!showComp&&<button className="btn-p" onClick={handleStart} style={{background:tech.accent,color:'#07111e',border:'none',borderRadius:'50px',padding:'17px 56px',fontSize:'16px',fontWeight:700,letterSpacing:'-0.01em',boxShadow:`0 6px 28px ${tech.accent}44`}}>begin</button>}

    </div>
    {showComp&&<SessionComplete th={th} tech={tech} cycles={cycles} minutes={sessMin} onContinue={handleContinue}/>}
  </div>;
}

      </div>

          <span style={{fontSize:'62px',fontWeight:300,color:th.text,letterSpacing:'-0.03em',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{fmtHHMM(earned).split(':')[0]}</span>

          <span style={{fontSize:'62px',fontWeight:300,color:th.text,letterSpacing:'-0.03em',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{fmtHHMM(earned).split(':')[1]}</span>

// ── StatsScreen ───────────────────────────────────────────────────────────────
function StatsScreen({th,data}){
  const streak=calcStreak(data.sessions);
  const todayStr_=todayStr();
  const todaySess=data.sessions.filter(s=>s.date===todayStr_);
  const todayCount=todaySess.length;
  const days=last7(data.sessions);
  const GOAL=3;

  // today timeline
  const nowHour=new Date().getHours();
  const activeHours=new Set(todaySess.map(s=>s.hour!=null?s.hour:nowHour).filter(h=>h>=TL_START&&h<TL_END));

  // technique counts
  const tc={};data.sessions.forEach(s=>{tc[s.technique]=(tc[s.technique]||0)+1;});
  const maxTc=Math.max(...Object.values(tc),1);

  // best streak
  const allDays=[...new Set(data.sessions.map(s=>s.date))].sort().reverse();
  let best=0,cur=0;
  allDays.forEach((d,i)=>{
    if(i===0){cur=1;}
    else{ const diff=Math.round((new Date(allDays[i-1])-new Date(d))/86400000); if(diff===1)cur++; else{best=Math.max(best,cur);cur=1;} }
  });
  best=Math.max(best,cur);

  // week sessions (last 7 days)
  const weekSess=data.sessions.filter(s=>{const d=new Date();d.setDate(d.getDate()-6);return new Date(s.date)>=d;}).length;

  return<div className="scroll-area fade-up" style={{paddingBottom:'88px'}}>
    <div style={{padding:'0 20px'}}>

      {/* TOTAL BREATHED hero — matches home BANKED SCREENTIME style */}
      <div style={{paddingTop:'52px',marginBottom:'18px'}}>
        <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.16em',textTransform:'uppercase',fontWeight:500,marginBottom:'10px'}}>TOTAL BREATHED</p>
        <div style={{display:'flex',alignItems:'baseline',gap:'2px',marginBottom:'8px'}}>
          <span style={{fontSize:'62px',fontWeight:300,color:th.text,letterSpacing:'-0.03em',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{fmtHHMM(data.totalMin).split(':')[0]}</span>
          <span style={{fontSize:'50px',fontWeight:300,color:th.label,lineHeight:1,margin:'0 1px'}}>:</span>
          <span style={{fontSize:'62px',fontWeight:300,color:th.text,letterSpacing:'-0.03em',lineHeight:1,fontVariantNumeric:'tabular-nums'}}>{fmtHHMM(data.totalMin).split(':')[1]}</span>
          <span style={{fontSize:'15px',color:th.text2,marginLeft:'6px',marginBottom:'6px'}}>min</span>
        </div>
        <div style={{display:'flex',gap:'16px'}}>
          <span style={{color:th.teal,fontSize:'13px',fontWeight:500}}>+{data.sessions.length} sessions</span>
          <span style={{color:th.text2,fontSize:'13px'}}>· {streak} day streak</span>
        </div>
      </div>

      {/* Today's timeline — same card as home */}
      <div style={{marginBottom:'14px',background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',padding:'13px 15px',boxShadow:th.cardShadow}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
          <p style={{color:th.text,fontSize:'13px'}}>today's mindful minutes</p>
          <p style={{fontSize:'13px'}}><span style={{color:th.teal,fontWeight:600}}>{todayCount}</span><span style={{color:th.label}}>/10</span></p>
        </div>
        <div style={{display:'flex',gap:'2px',marginBottom:'5px'}}>
          {Array.from({length:TL_SLOTS},(_,i)=>{
            const h=TL_START+i;
            const active=activeHours.has(h);
            const curr=h===nowHour;
            return<div key={i} style={{flex:1,height:'5px',borderRadius:'2px',background:active?th.teal:curr?`${th.teal}35`:th.text4,transition:'background 0.4s ease'}}/>;
          })}
        </div>
        <div style={{display:'flex',justifyContent:'space-between'}}>
          {['6AM','NOON','NOW','10PM'].map(l=><span key={l} style={{color:th.label,fontSize:'9px',letterSpacing:'0.04em'}}>{l}</span>)}
        </div>
      </div>

      {/* STREAK pair — two cols */}
      <div style={{display:'flex',gap:'10px',marginBottom:'14px'}}>
        <div style={{flex:1,background:streak>0?'linear-gradient(135deg,rgba(232,162,60,0.10),rgba(200,100,0,0.04))':th.surf,border:`1px solid ${streak>0?'rgba(232,162,60,0.18)':th.border}`,borderRadius:'13px',padding:'16px 14px',boxShadow:th.cardShadow}}>
          <p style={{color:th.label,fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:'8px'}}>STREAK</p>
          <div style={{display:'flex',alignItems:'baseline',gap:'5px',marginBottom:'4px'}}>
            <span style={{fontSize:'38px',fontWeight:300,color:streak>0?'#e8a23c':th.text2,letterSpacing:'-0.04em',fontVariantNumeric:'tabular-nums',animation:streak>0?'streakPulse 3s ease infinite':'none'}}>{streak}</span>
            <span style={{color:streak>0?'rgba(232,162,60,0.55)':th.label,fontSize:'12px'}}>days</span>
          </div>
          <p style={{color:streak>0?'rgba(232,162,60,0.55)':th.label,fontSize:'11px'}}>{streak>=7?'🔥 on fire':streak>=3?'✦ building':streak>0?'◎ started':'🌱 begin'}</p>
        </div>
        <div style={{flex:1,background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',padding:'16px 14px',boxShadow:th.cardShadow}}>
          <p style={{color:th.label,fontSize:'9px',letterSpacing:'0.14em',textTransform:'uppercase',marginBottom:'8px'}}>BEST</p>
          <div style={{display:'flex',alignItems:'baseline',gap:'5px',marginBottom:'4px'}}>
            <span style={{fontSize:'38px',fontWeight:300,color:th.text,letterSpacing:'-0.04em',fontVariantNumeric:'tabular-nums'}}>{best}</span>
            <span style={{color:th.label,fontSize:'12px'}}>days</span>
          </div>
          <p style={{color:th.label,fontSize:'11px'}}>personal best</p>
        </div>
      </div>

      {/* LAST 7 DAYS — list rows like locked apps */}
      <div style={{marginBottom:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
          <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.16em',textTransform:'uppercase',fontWeight:500}}>LAST 7 DAYS</p>
          <p style={{color:th.label,fontSize:'11px'}}>{weekSess} sessions</p>
        </div>
        <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',overflow:'hidden',boxShadow:th.cardShadow}}>
          {days.map((d,i)=>{
            const pct=Math.min(100,(d.count/GOAL)*100);
            return<div key={d.date} style={{display:'flex',alignItems:'center',gap:'13px',padding:'11px 15px',borderBottom:i<days.length-1?`1px solid ${th.border}`:'none'}}>
              <p style={{color:d.isToday?th.teal:th.text2,fontSize:'12px',fontWeight:d.isToday?600:400,width:'26px',flexShrink:0}}>{d.label}</p>
              <div style={{flex:1,height:'4px',background:th.text4,borderRadius:'2px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,borderRadius:'2px',background:d.count>=GOAL?th.teal:d.count>0?`${th.teal}60`:'transparent',transition:'width 0.8s ease'}}/>
              </div>
              <p style={{color:d.count>0?th.teal:th.label,fontSize:'12px',fontWeight:d.count>0?600:400,width:'14px',textAlign:'right',flexShrink:0}}>{d.count>0?d.count:'·'}</p>
            </div>;
          })}
        </div>
      </div>

      {/* TECHNIQUES — list rows like locked apps */}
      {Object.keys(tc).length>0&&<div style={{marginBottom:'14px'}}>
        <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.16em',textTransform:'uppercase',fontWeight:500,marginBottom:'10px'}}>TECHNIQUES</p>
        <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',overflow:'hidden',boxShadow:th.cardShadow}}>
          {TECHNIQUES.filter(t=>tc[t.id]).sort((a,b)=>(tc[b.id]||0)-(tc[a.id]||0)).map((t,i,arr)=>{
            const count=tc[t.id]||0;
            const pct=Math.min(100,(count/maxTc)*100);
            return<div key={t.id} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 15px',borderBottom:i<arr.length-1?`1px solid ${th.border}`:'none'}}>
              <div style={{width:'8px',height:'8px',borderRadius:'50%',background:t.accent,flexShrink:0}}/>
              <p style={{color:th.text,fontSize:'13px',fontWeight:500,width:'68px',flexShrink:0}}>{t.name}</p>
              <div style={{flex:1,height:'4px',background:th.text4,borderRadius:'2px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,borderRadius:'2px',background:t.accent,transition:'width 0.8s ease'}}/>
              </div>
              <p style={{color:th.text2,fontSize:'12px',width:'22px',textAlign:'right',flexShrink:0}}>{count}</p>
            </div>;
          })}
        </div>
      </div>}

      {/* TODAY'S GOAL */}
      <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',padding:'14px 16px',marginBottom:'12px',boxShadow:th.cardShadow}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'9px'}}>
          <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.14em',textTransform:'uppercase',fontWeight:500}}>TODAY'S GOAL</p>
          <p style={{color:th.label,fontSize:'12px'}}>{todayCount} / {GOAL} sessions</p>
        </div>
        <div style={{height:'4px',background:th.text4,borderRadius:'2px'}}>
          <div style={{height:'100%',borderRadius:'2px',width:`${Math.min(100,(todayCount/GOAL)*100)}%`,background:todayCount>=GOAL?'#4dbfae':th.teal,transition:'width 1s cubic-bezier(0.4,0,0.2,1)'}}/>
        </div>
      </div>

      {data.sessions.length===0&&<div style={{textAlign:'center',padding:'36px 20px',color:th.label,fontSize:'13px'}}>
        <p style={{fontSize:'32px',marginBottom:'12px'}}>🌬️</p>complete your first session to see progress here.
      </div>}
    </div>
  </div>;
}

// ── ScreenTimeSetup — step-by-step iOS/Android setup cards ───────────────────
function ScreenTimeSetup({th,appEnabled,appLimits}){
  const[done,setDone]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('breathe_setup')||'{}');}catch(e){return{};}
  });
  const mark=(id)=>{
    const n={...done,[id]:!done[id]};
    setDone(n);
    try{localStorage.setItem('breathe_setup',JSON.stringify(n));}catch(e){}
  };

  const enabledApps=APPS.filter(a=>appEnabled?.[a.id]);

  const steps=[
    {
      id:'enable',
      num:'01',
      title:'Enable Screen Time',
      desc:'Turn on Screen Time in Settings. This activates all parental controls and app limits.',
      action:'Open Screen Time →',
      btn:()=>window.location.href='App-Prefs:root=SCREENTIME',
      os:'iOS',
    },
    {
      id:'limits',
      num:'02',
      title:'Set App Limits',
      desc:enabledApps.length>0
        ?`Add limits for: ${enabledApps.map(a=>`${a.name} (${appLimits?.[a.id]||a.limit}m)`).join(', ')}. App Limits → Add Limit → search app → set time.`
        :'Add Limit for each app. App Limits → Add Limit → search Instagram / TikTok → set daily time.',
      action:'Open App Limits →',
      btn:()=>window.location.href='App-Prefs:root=SCREENTIME',
      os:'iOS',
    },
    {
      id:'block',
      num:'03',
      title:'Enable "Block at End of Limit"',
      desc:'Critical step — without this, the limit only shows a warning. Toggle it ON for each app you set a limit for.',
      action:'Open App Limits →',
      btn:()=>window.location.href='App-Prefs:root=SCREENTIME',
      os:'iOS',
    },
    {
      id:'passcode',
      num:'04',
      title:'Set a Screen Time Passcode',
      desc:'Use a passcode you won\'t remember easily — or give it to a friend. Without this anyone can remove the limits.',
      action:'Set Passcode →',
      btn:()=>window.location.href='App-Prefs:root=SCREENTIME',
      os:'iOS',
    },
    {
      id:'android',
      num:'05',
      title:'Android — Digital Wellbeing',
      desc:'Settings → Digital Wellbeing → Dashboard → tap an app → set a Timer. Works the same way as iOS App Limits.',
      action:'Open Settings →',
      btn:()=>window.location.href='intent:#Intent;action=android.settings.DIGITAL_WELLBEING;end',
      os:'Android',
    },
  ];

  return<div style={{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'12px'}}>
    {steps.map((s,i)=>{
      const isDone=done[s.id];
      return<div key={s.id} className="fade-up" style={{background:th.surf,border:`1px solid ${isDone?th.teal+'44':th.border}`,borderRadius:'13px',padding:'15px 16px',boxShadow:th.cardShadow,animationDelay:`${i*40}ms`,opacity:isDone?0.65:1,transition:'opacity 0.2s,border-color 0.2s'}}>
        <div style={{display:'flex',gap:'12px',alignItems:'flex-start'}}>
          {/* Step badge + done toggle */}
          <button onClick={()=>mark(s.id)} style={{width:'32px',height:'32px',borderRadius:'50%',background:isDone?th.teal:th.text4,border:`1.5px solid ${isDone?th.teal:th.border}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,cursor:'pointer',transition:'all 0.2s ease'}}>
            {isDone
              ?<span style={{color:'#07111e',fontSize:'13px',fontWeight:700}}>✓</span>
              :<span style={{color:th.label,fontSize:'10px',fontWeight:600,fontFamily:"'DM Mono',monospace"}}>{s.num}</span>
            }
          </button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
              <p style={{color:th.text,fontSize:'14px',fontWeight:600}}>{s.title}</p>
              <span style={{background:th.text4,border:`1px solid ${th.border}`,borderRadius:'8px',padding:'2px 7px',color:th.label,fontSize:'10px',letterSpacing:'0.04em'}}>{s.os}</span>
            </div>
            <p style={{color:th.text2,fontSize:'12px',lineHeight:1.55,marginBottom:'12px'}}>{s.desc}</p>
            <button onClick={s.btn} className="btn-s" style={{background:th.tealBg||`${th.teal}18`,border:`1px solid ${th.teal}44`,borderRadius:'9px',padding:'8px 14px',color:th.teal,fontSize:'12px',fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:'5px'}}>
              <span>⚙</span> {s.action}
            </button>
          </div>
        </div>
      </div>;
    })}
  </div>;
}

// ── ApplyLimitSheet ───────────────────────────────────────────────────────────
const APP_SEARCH_NAMES={instagram:'Instagram',tiktok:'TikTok',youtube:'YouTube',twitter:'X'};

function ApplyLimitSheet({th,app,limit,onClose}){
  const[platform,setPlatform]=useState('ios');
  const[copied,setCopied]=useState(false);
  const searchName=APP_SEARCH_NAMES[app.id]||app.name;

  const copyName=()=>{
    navigator.clipboard.writeText(searchName).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    }).catch(()=>{});
  };

  const openSettings=()=>{
    if(platform==='ios') window.location.href='App-Prefs:root=SCREENTIME';
    else window.location.href='intent:#Intent;action=android.settings.DIGITAL_WELLBEING;end';
  };

  const iosSteps=[
    {n:'01', text:`Open App Limits in Screen Time`, btn:'Open Settings', action:openSettings},
    {n:'02', text:'Tap "Add Limit"', btn:null},
    {n:'03', text:`Search for "${searchName}" and select it`, btn:copied?'Copied ✓':'Copy name', action:copyName, accent:true},
    {n:'04', text:`Set time to  ${limit} min/day`, btn:null},
    {n:'05', text:'Toggle "Block at End of Limit" ON — critical step', btn:null, warn:true},
    {n:'06', text:'Tap "Add" to save', btn:null},
  ];
  const androidSteps=[
    {n:'01', text:'Open Digital Wellbeing in Settings', btn:'Open Settings', action:openSettings},
    {n:'02', text:'Tap "Dashboard"'},
    {n:'03', text:`Find "${searchName}" in the list`, btn:copied?'Copied ✓':'Copy name', action:copyName, accent:true},
    {n:'04', text:`Tap the hourglass icon → set ${limit} min/day`},
    {n:'05', text:'App auto-pauses when time is up', warn:false},
  ];
  const steps=platform==='ios'?iosSteps:androidSteps;

  return<div style={{position:'fixed',inset:0,background:th.overlay,display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:950,animation:'overlayIn 0.22s ease'}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:'430px',background:th.id==='dark'?'#0d1b36':'#fff',borderRadius:'28px 28px 0 0',padding:'28px 24px 48px',animation:'slideUp 0.36s cubic-bezier(0.4,0,0.2,1)',border:`1px solid ${th.border}`,borderBottom:'none',maxHeight:'88vh',overflowY:'auto'}}>
      <div style={{width:'40px',height:'4px',borderRadius:'2px',background:th.text4,margin:'0 auto 22px'}}/>

      {/* App + limit header */}
      <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'20px'}}>
        <div style={{width:'48px',height:'48px',borderRadius:'13px',background:app.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          <span style={{color:'rgba(255,255,255,0.92)',fontSize:'14px',fontWeight:700}}>{app.initials}</span>
        </div>
        <div style={{flex:1}}>
          <p style={{color:th.text,fontSize:'17px',fontWeight:600,letterSpacing:'-0.01em'}}>{searchName}</p>
          <p style={{color:th.text2,fontSize:'13px'}}>set limit to <span style={{color:th.teal,fontWeight:600}}>{limit} min/day</span> on device</p>
        </div>
        <button onClick={onClose} style={{background:th.text4,border:`1px solid ${th.border}`,borderRadius:'50%',width:'28px',height:'28px',color:th.label,fontSize:'14px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
      </div>

      {/* Platform toggle */}

  const update=useCallback(d=>{setData(d);saveData(d);},[]);

  const toggleTheme=()=>{setSwitching(true);const next=theme==='dark'?'light':'dark';setTheme(next);update({...data,theme:next});setTimeout(()=>setSwitching(false),420);};

  useEffect(()=>{if(!data.reminder?.enabled||Notification.permission!=='granted')return;const[rh,rm]=(data.reminder.time||'08:00').split(':').map(Number);const now=new Date();if(Math.abs(now.getHours()*60+now.getMinutes()-rh*60-rm)<8)new Notification('🌬️ time to breathe',{body:'Your daily session is waiting.'});},[]);

  const handleGate=()=>{if(!isPrem)setShowPrem(true);else setTab('screentime');};
  const handleTrial=()=>{const d={...data,premium:{...data.premium,trial:true,trialStart:new Date().toISOString()}};update(d);setShowPrem(false);setTab('screentime');};
  const handleBuy=()=>{const d={...data,premium:{...data.premium,paid:true}};update(d);setShowPrem(false);setTab('screentime');};

  const handlePickTech=(t,targetAppId=null)=>{ setTech(t); setTechTarget(targetAppId||null); };

  const handleDone=(techId,minutes,cycles)=>{
    const earned=minutes*10;
    const ae={...(data.appEarned||{})};
    if(techTarget){
      // credit all earned time to the targeted app specifically
      ae[techTarget]=(ae[techTarget]||0)+earned;
    } else {
      const ids=APPS.filter(a=>data.appEnabled?.[a.id]).map(a=>a.id);
      ids.forEach(id=>{ae[id]=(ae[id]||0)+Math.round(earned/Math.max(ids.length,1));});
    }
    const d={...data,sessions:[...data.sessions,{date:todayStr(),technique:techId,duration:minutes,cycles,hour:new Date().getHours(),ts:Date.now()}],totalMin:data.totalMin+minutes,earnedMin:(data.earnedMin||0)+earned,appEarned:ae};
    update(d);setTech(null);setTechTarget(null);
    // if targeted a specific app, return to home so user can open it
    setTab(techTarget?'home':'stats');
    if(techTarget){ const app=APPS.find(a=>a.id===techTarget); if(app) setTimeout(()=>openApp(app),800); }
  };

  const nc=id=>tab===id?th.teal:th.label;

  return<div className={switching?'theme-transition':''} style={{height:'100dvh',maxWidth:'430px',margin:'0 auto',background:th.bg,display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',transition:switching?'background 0.38s ease':'none'}}>
    <div style={{position:'absolute',top:0,left:0,right:0,height:'35%',background:`radial-gradient(ellipse at 50% -10%,${th.id==='dark'?'rgba(79,205,216,0.04)':'rgba(8,145,178,0.04)'} 0%,transparent 70%)`,pointerEvents:'none',zIndex:0}}/>

    {hasTr&&!tech&&<div className="fade-down" style={{position:'absolute',top:0,left:0,right:0,zIndex:20,background:'linear-gradient(90deg,#a48ee8,#5ec4e0)',padding:'7px 16px',textAlign:'center'}}><p style={{color:'#fff',fontSize:'12px',fontWeight:600}}>✦ free trial — {dLeft} day{dLeft!==1?'s':''} remaining</p></div>}

    <div style={{flex:1,overflow:'hidden',position:'relative',zIndex:1,marginTop:hasTr&&!tech?'30px':0}}>
      {tech?(
        <SessionScreen th={th} tech={tech} onDone={handleDone} onBack={()=>setTech(null)} sound={sound}/>
      ):tab==='home'?(
        <HomeScreen th={th} data={data} onPick={handlePickTech} onGate={handleGate} onReminder={()=>setShowRem(true)} sound={sound} onSound={()=>setSound(s=>!s)} onTheme={toggleTheme} theme={theme} isPrem={isPrem} selTech={selTech} onSelTech={setSelTech}/>
      ):tab==='stats'?(
        <StatsScreen th={th} data={data}/>
      ):(
        <ScreentimeScreen th={th} data={data} isPrem={isPrem} onGate={handleGate} onUpdate={update}/>
      )}
    </div>

    {!tech&&<div style={{background:th.navBg,backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',borderTop:`1px solid ${th.border}`,padding:'10px 0 28px',display:'flex',justifyContent:'space-around',position:'relative',zIndex:10,transition:switching?'background 0.38s ease':'none'}}>
      {[{id:'home',label:'home',Icon:HomeIcon},{id:'stats',label:'stats',Icon:ChartIcon},{id:'screentime',label:'time',Icon:ShieldIcon}].map(({id,label,Icon})=>(
        <button key={id} className="nav-btn" onClick={()=>setTab(id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',padding:'4px 18px',position:'relative'}}>
          {id==='screentime'&&!isPrem&&<span style={{position:'absolute',top:'0px',right:'10px',width:'6px',height:'6px',borderRadius:'50%',background:'#a48ee8'}}/>}
          <Icon c={nc(id)} a={tab===id}/>
          <span style={{fontSize:'10px',letterSpacing:'0.05em',color:nc(id),fontWeight:tab===id?600:400,transition:'color 0.2s'}}>{label}</span>
        </button>
      ))}
    </div>}

    {showPrem&&<PremiumModal th={th} hasTrial={hasTr} onClose={()=>setShowPrem(false)} onTrial={handleTrial} onBuy={handleBuy}/>}
    {showRem&&<ReminderSheet th={th} reminder={data.reminder||{enabled:false,time:'08:00'}} onSave={r=>{update({...data,reminder:r});setShowRem(false);}} onClose={()=>setShowRem(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
