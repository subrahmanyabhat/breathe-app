<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: 'DM Sans', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; overscroll-behavior: none; touch-action: manipulation; }
button { font-family: inherit; outline: none; -webkit-tap-highlight-color: transparent; }
::-webkit-scrollbar { display: none; }
.scroll-area { overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%; }

.theme-transition, .theme-transition * {
  transition: background-color 0.38s ease, color 0.28s ease, border-color 0.32s ease, box-shadow 0.35s ease !important;
}

@keyframes fadeUp   { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
@keyframes scaleIn  { from { opacity:0; transform:scale(0.94); } to { opacity:1; transform:scale(1); } }
@keyframes popIn    { 0%{opacity:0;transform:scale(0.82) translateY(12px);} 65%{transform:scale(1.04) translateY(-2px);} 100%{opacity:1;transform:scale(1) translateY(0);} }
@keyframes slideUp  { from { opacity:0; transform:translateY(50px); } to { opacity:1; transform:translateY(0); } }
@keyframes overlayIn { from{opacity:0} to{opacity:1} }
@keyframes shimmer  { 0%{transform:translateX(-100%)} 100%{transform:translateX(250%)} }
@keyframes floatDot { 0%{opacity:0.8;transform:translate(var(--tx),var(--ty)) scale(1)} 100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.3)} }
@keyframes pulseRing { 0%,100%{transform:scale(1);opacity:0.4} 50%{transform:scale(1.1);opacity:0.15} }
@keyframes countPop  { 0%{opacity:0;transform:scale(0.7)} 60%{transform:scale(1.08)} 100%{opacity:1;transform:scale(1)} }
@keyframes streakPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.04)} }
@keyframes calDotIn { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }

.fade-up   { animation: fadeUp  0.42s cubic-bezier(0.4,0,0.2,1) both; }
.fade-down { animation: fadeDown 0.32s ease both; }
.scale-in  { animation: scaleIn 0.30s cubic-bezier(0.4,0,0.2,1) both; }
.pop-in    { animation: popIn   0.48s cubic-bezier(0.34,1.2,0.64,1) both; }
.slide-up  { animation: slideUp 0.38s cubic-bezier(0.4,0,0.2,1) both; }

.tech-card { cursor:pointer; transition: transform 0.22s cubic-bezier(0.4,0,0.2,1), box-shadow 0.22s ease; -webkit-tap-highlight-color:transparent; }
.tech-card:hover  { transform: translateY(-4px) scale(1.01); box-shadow: 0 12px 32px rgba(0,0,0,0.25); }
.tech-card:active { transform: scale(0.972); }

.app-pill { cursor:pointer; transition: transform 0.18s ease, opacity 0.18s ease; }
.app-pill:hover  { transform: translateY(-2px); }
.app-pill:active { transform: scale(0.95); opacity:0.7; }

.btn-p { cursor:pointer; transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease; }
.btn-p:hover  { transform: translateY(-1px); }
.btn-p:active { transform: scale(0.96); opacity:0.85; }

.btn-s { cursor:pointer; transition: opacity 0.18s ease; }
.btn-s:hover  { opacity: 0.65; }
.btn-s:active { opacity: 0.4; }

.nav-btn { -webkit-tap-highlight-color:transparent; transition: opacity 0.15s ease; }
.nav-btn:active { opacity:0.4; }

.shimmer-card { position:relative; overflow:hidden; }
.shimmer-card::after {
  content:''; position:absolute; top:0; bottom:0; left:-60%;
  width:40%; background: linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);
  animation: shimmer 2.8s ease-in-out infinite;
}

.particle {
  position:absolute; border-radius:50%; pointer-events:none;
  animation: floatDot 1.5s ease-out forwards;
}
</style>

// ── Audio ────────────────────────────────────────────────────────────────────
let _ctx=null, _ag=null, _ao=[];
const getCtx = () => { if(!_ctx) _ctx=new(window.AudioContext||window.webkitAudioContext)(); if(_ctx.state==='suspended') _ctx.resume(); return _ctx; };
function playBell(freq) {
  try {
    const ctx=getCtx(), t=ctx.currentTime, osc=ctx.createOscillator(), env=ctx.createGain();
    osc.type='sine'; osc.frequency.setValueAtTime(freq,t); osc.frequency.exponentialRampToValueAtTime(freq*0.72,t+1.6);
    env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(0.11,t+0.04); env.gain.exponentialRampToValueAtTime(0.001,t+1.9);
    osc.connect(env); env.connect(ctx.destination); osc.start(t); osc.stop(t+1.9);
  } catch(e) {}
}
const phaseSound = l => playBell({Inhale:528,Hold:396,Exhale:432}[l]||528);
function startAmbient() {
  try {
    stopAmbient(); const ctx=getCtx(), m=ctx.createGain();
    m.gain.setValueAtTime(0,ctx.currentTime); m.gain.linearRampToValueAtTime(0.03,ctx.currentTime+2.5);
    m.connect(ctx.destination); _ag=m; _ao=[];
    [[110,1],[220.12,0.28],[165.06,0.18]].forEach(([f,g])=>{
      const o=ctx.createOscillator(), gn=ctx.createGain();
      o.type='sine'; o.frequency.value=f; gn.gain.value=g; o.connect(gn); gn.connect(m); o.start(); _ao.push(o);
    });
  } catch(e) {}
}
function stopAmbient() {
  try { if(_ag&&_ctx){ _ag.gain.linearRampToValueAtTime(0,_ctx.currentTime+1.2); const o=[..._ao]; setTimeout(()=>o.forEach(x=>{try{x.stop();}catch(e){}}),1400); _ao=[]; _ag=null; } } catch(e) {}
}

// ── Storage ──────────────────────────────────────────────────────────────────
const SK = 'breathe_v5';
const DEF = { sessions:[], totalMin:0, earnedMin:0, appEarned:{}, appLimits:{}, appEnabled:{instagram:true,tiktok:true,youtube:false,twitter:false}, premium:{paid:false,trial:false,trialStart:null}, reminder:{enabled:false,time:'08:00'}, theme:'dark' };
const loadData = () => { try { return {...DEF,...JSON.parse(localStorage.getItem(SK))}; } catch(e) { return {...DEF}; } };
const saveData = d => { try { localStorage.setItem(SK,JSON.stringify(d)); } catch(e) {} };
const todayStr = () => new Date().toISOString().slice(0,10);

function calcStreak(sessions) {
  const days=[...new Set(sessions.map(s=>s.date))].sort().reverse();
  if(!days.length||days[0]!==todayStr()) return 0;
  let n=1;
  for(let i=1;i<days.length;i++) { if(Math.round((new Date(days[i-1])-new Date(days[i]))/86400000)===1) n++; else break; }
  return n;
}
function last7(sessions) {
  return Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i));
    const date=d.toISOString().slice(0,10);
    return { date, label:d.toLocaleDateString('en',{weekday:'narrow'}), isToday:i===6, count:sessions.filter(s=>s.date===date).length };
  });
}
const isPremActive = p => p.paid || (p.trial && p.trialStart && (Date.now()-new Date(p.trialStart))/86400000 < 7);
const trialLeft   = p => !p.trial||!p.trialStart ? 0 : Math.max(0,7-Math.floor((Date.now()-new Date(p.trialStart))/86400000));

// ── Orb helpers ──────────────────────────────────────────────────────────────
function orbProps(label, dur, lastDir) {
  if(label==='Inhale') return {scale:1.26,glow:0.72,dur};
  if(label==='Exhale') return {scale:0.68,glow:0.10,dur};
  return lastDir==='in' ? {scale:1.26,glow:0.50,dur:0.45} : {scale:0.68,glow:0.07,dur:0.45};
}
function glowShadow(accent,g) {
  const h=n=>Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');
  return `0 0 ${Math.round(g*52)}px ${accent}${h(g*210)}, 0 0 ${Math.round(g*96)}px ${accent}${h(g*65)}`;
}

// ── SessionScreen ─────────────────────────────────────────────────────────────
function SessionScreen({th, tech, onDone, onBack, sound}) {
  const [running,  setRunning]  = useState(false);
  const [phaseIdx, setPhaseIdx] = useState(0);
  const [count,    setCount]    = useState(tech.phases[0].d);
  const [cycles,   setCycles]   = useState(0);
  const [lastDir,  setLastDir]  = useState('neutral');
  const [particles,setParticles]= useState([]);
  const [showComp, setShowComp] = useState(false);
  const [sessMin,  setSessMin]  = useState(1);
  const startRef = useRef(null);
  const pid = useRef(0);

  const phase = tech.phases[phaseIdx];
  const orb   = running ? orbProps(phase.l, phase.d, lastDir) : {scale:0.82,glow:0.14,dur:0.9};
  const isHold= running && phase.l === 'Hold';

  // particles on inhale
  useEffect(() => {
    if(!running || phase.l !== 'Inhale') return;
    const iv = setInterval(() => {
      const id = ++pid.current;
      const angle = Math.random()*360;
      const r = 90+Math.random()*35;
      const tx  = `${Math.cos(angle*Math.PI/180)*r}px`;
      const ty  = `${Math.sin(angle*Math.PI/180)*r}px`;
      const tx2 = `${Math.cos(angle*Math.PI/180)*(r+30)}px`;
      const ty2 = `${Math.sin(angle*Math.PI/180)*(r+30)}px`;
      const sz  = 2+Math.random()*3;
      setParticles(p=>[...p.slice(-10),{id,tx,ty,tx2,ty2,sz}]);
      setTimeout(()=>setParticles(p=>p.filter(x=>x.id!==id)), 1600);
    }, 380);
    return ()=>clearInterval(iv);
  }, [running, phaseIdx]);

  // phase engine
  useEffect(() => {
    if(!running) return;
    const p = tech.phases[phaseIdx];
    if(p.l==='Inhale') setLastDir('in');
    else if(p.l==='Exhale') setLastDir('out');
    if(sound) phaseSound(p.l);
    setCount(p.d);
    let c=p.d;
    const iv=setInterval(()=>{c--;setCount(c);if(c<=0)clearInterval(iv);},1000);
    const tm=setTimeout(()=>{
      const next=(phaseIdx+1)%tech.phases.length;
      if(next===0) setCycles(n=>n+1);
      setPhaseIdx(next);
    }, p.d*1000);
    return ()=>{clearInterval(iv);clearTimeout(tm);};
  }, [phaseIdx, running]);

  useEffect(()=>()=>stopAmbient(),[]);

  const handleStart = () => { startRef.current=Date.now(); setRunning(true); if(sound) startAmbient(); };
  const handleEnd   = () => {
    stopAmbient(); setRunning(false);
    const m=Math.max(1,Math.round((Date.now()-(startRef.current||Date.now()))/60000));
    setSessMin(m); setShowComp(true);
  };
  const handleContinue = () => { setShowComp(false); onDone(tech.id, sessMin, cycles); };

  return (
    <div className="scale-in" style={{height:'100%',display:'flex',flexDirection:'column',background:th.bg}}>
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'50px 20px 12px'}}>
        <button onClick={onBack} style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'10px',color:th.text2,padding:'8px 14px',fontSize:'14px',cursor:'pointer'}}>← Back</button>
        <p style={{color:tech.accent,fontSize:'12px',fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase'}}>{tech.name}</p>
        <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'10px',color:th.text2,padding:'8px 14px',fontSize:'13px',minWidth:'56px',textAlign:'center'}}>
          {running ? <span><span style={{color:tech.accent,fontWeight:700}}>{cycles+1}</span><span style={{fontSize:'10px',opacity:0.6}}> cyc</span></span> : '—'}
        </div>
      </div>

      {/* Orb area */}
      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
        {/* bloom */}
        <div style={{position:'absolute',width:'360px',height:'360px',borderRadius:'50%',background:`radial-gradient(circle,${tech.accent}07 0%,transparent 70%)`,transform:`scale(${running?orb.scale*1.55:1.1})`,transition:`transform ${orb.dur}s ease`,pointerEvents:'none'}}/>
        {/* rings */}
        {[[290,1.16,0.16],[240,1.07,0.28]].map(([sz,sm,om],i)=>(
          <div key={i} style={{position:'absolute',width:`${sz}px`,height:`${sz}px`,borderRadius:'50%',border:`1px solid ${tech.accent}`,opacity:running?orb.glow*om:0.04,transform:`scale(${running?orb.scale*sm:1})`,transition:`opacity ${isHold?0.45:orb.dur}s ease,transform ${isHold?0.45:orb.dur}s ease`,pointerEvents:'none'}}/>
        ))}
        {/* particles */}
        {particles.map(p=>(
          <div key={p.id} className="particle" style={{width:`${p.sz}px`,height:`${p.sz}px`,background:tech.accent,opacity:0.65,'--tx':p.tx,'--ty':p.ty,'--tx2':p.tx2,'--ty2':p.ty2,top:`calc(50% - ${p.sz/2}px)`,left:`calc(50% - ${p.sz/2}px)`}}/>
        ))}
        {/* main orb */}
        <div style={{width:'200px',height:'200px',borderRadius:'50%',border:`1.5px solid ${tech.accent}${running?'cc':'40'}`,background:`radial-gradient(circle at 38% 32%,${tech.accent}26,${tech.accent}07 55%,transparent)`,transform:`scale(${orb.scale})`,transition:`transform ${isHold?0.45:orb.dur}s cubic-bezier(0.4,0,0.2,1),box-shadow ${isHold?0.45:orb.dur}s ease,border-color 0.4s ease`,boxShadow:glowShadow(tech.accent,orb.glow),display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',zIndex:1}}>
          <p style={{fontSize:'12px',fontWeight:500,letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(255,255,255,0.5)',marginBottom:running?'8px':0,transition:'all 0.3s ease'}}>
            {running ? phase.l : 'Ready'}
          </p>
          {running && (
            <p key={count} style={{fontSize:'46px',fontWeight:300,color:tech.accent,letterSpacing:'-0.04em',lineHeight:1,animation:'countPop 0.3s cubic-bezier(0.34,1.3,0.64,1) both'}}>
              {count}
            </p>
          )}
        </div>
        {/* phase dots */}
        {running && (
          <div style={{marginTop:'28px',display:'flex',gap:'8px',alignItems:'center'}}>
            {tech.phases.map((p,i)=>(
              <div key={i} style={{width:i===phaseIdx?'28px':'7px',height:'7px',borderRadius:'4px',background:i===phaseIdx?tech.accent:'rgba(255,255,255,0.12)',transition:'all 0.38s cubic-bezier(0.34,1.3,0.64,1)'}}/>
            ))}
          </div>
        )}
        {/* phase labels */}
        {running && (
          <div style={{marginTop:'18px',display:'flex',gap:'20px'}}>
            {tech.phases.map((p,i)=>(
              <div key={i} style={{textAlign:'center',opacity:i===phaseIdx?1:0.22,transition:'opacity 0.35s ease,transform 0.35s ease',transform:i===phaseIdx?'translateY(0)':'translateY(2px)'}}>
                <p style={{color:'rgba(255,255,255,0.85)',fontSize:'11px',marginBottom:'2px'}}>{p.l}</p>
                <p style={{color:tech.accent,fontSize:'10px'}}>{p.d}s</p>
              </div>
            ))}
          </div>
        )}
        {/* cycles done badge */}
        {running && cycles > 0 && (
          <div className="fade-down" style={{marginTop:'18px'}}>
            <div style={{background:`${tech.accent}18`,border:`1px solid ${tech.accent}40`,borderRadius:'20px',padding:'5px 14px',display:'inline-flex',alignItems:'center',gap:'6px'}}>
              <span style={{color:tech.accent,fontSize:'12px',fontWeight:600}}>✦ {cycles} cycle{cycles!==1?'s':''} complete</span>
            </div>
          </div>
        )}
      </div>

      {/* Bottom */}
      <div style={{padding:'0 24px 52px',display:'flex',flexDirection:'column',alignItems:'center',gap:'14px'}}>
        {!running && !showComp && (
          <button className="btn-p" onClick={handleStart} style={{background:tech.accent,color:'#06101f',border:'none',borderRadius:'50px',padding:'17px 56px',fontSize:'16px',fontWeight:700,letterSpacing:'-0.01em',boxShadow:`0 6px 28px ${tech.accent}44`}}>Begin</button>
        )}
        {running && !showComp && (
          <button className="btn-s" onClick={handleEnd} style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'50px',color:th.text2,padding:'14px 36px',fontSize:'14px'}}>End Session</button>
        )}
      </div>
      {showComp && <SessionComplete th={th} tech={tech} cycles={cycles} minutes={sessMin} onContinue={handleContinue}/>}
    </div>
  );
}

// ── ScreentimeScreen ──────────────────────────────────────────────────────────
const LIMIT_STEPS = [5,10,15,20,30,45,60,90,120];
function nextStep(v,dir) {
  const i=LIMIT_STEPS.indexOf(v);
  if(i===-1) return dir>0?LIMIT_STEPS[1]:LIMIT_STEPS[0];
  return LIMIT_STEPS[Math.max(0,Math.min(LIMIT_STEPS.length-1,i+dir))];
}

function ScreentimeScreen({th, data, isPrem, onGate, onUpdate}) {
  const earned     = data.earnedMin||0;
  const appEnabled = data.appEnabled||{instagram:true,tiktok:true,youtube:false,twitter:false};
  const appLimits  = data.appLimits||{instagram:30,tiktok:30,youtube:60,twitter:30};
  const appEarned  = data.appEarned||{};

  const toggleApp = id => {
    const ae = {...appEnabled, [id]:!appEnabled[id]};
    onUpdate({...data, appEnabled:ae});
  };
  const adjustLimit = (id,dir) => {
    const lim = {...appLimits, [id]:nextStep(appLimits[id]||30, dir)};
    onUpdate({...data, appLimits:lim});
  };
  const useTime = (id,min) => {
    const ae={...appEarned};
    if((ae[id]||0)<min) return;
    ae[id]=(ae[id]||0)-min;
    onUpdate({...data, appEarned:ae});
  };

  if(!isPrem) return (
    <div className="fade-up" style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',textAlign:'center'}}>
      <div style={{width:'72px',height:'72px',borderRadius:'24px',margin:'0 auto 20px',background:'linear-gradient(135deg,rgba(164,142,232,0.2),rgba(94,196,224,0.15))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'32px',border:'1px solid rgba(164,142,232,0.3)'}}>🔒</div>
      <h3 style={{color:th.text,fontSize:'22px',fontWeight:700,marginBottom:'10px'}}>Premium Feature</h3>
      <p style={{color:th.text2,fontSize:'15px',lineHeight:1.6,marginBottom:'28px'}}>Block Instagram, TikTok, YouTube and more. Earn screentime back by breathing. Real accountability.</p>
      <button className="btn-p" onClick={onGate} style={{background:'linear-gradient(135deg,#a48ee8,#5ec4e0)',border:'none',borderRadius:'50px',padding:'16px 40px',color:'#fff',fontSize:'16px',fontWeight:700,boxShadow:'0 6px 24px rgba(164,142,232,0.38)'}}>Unlock Premium</button>
    </div>
  );

  const trackedApps = APPS.filter(a=>appEnabled[a.id]);
  const totalBank   = earned;

  return (
    <div className="scroll-area fade-up" style={{paddingBottom:'88px'}}>
      <div style={{padding:'0 20px',paddingTop:'52px'}}>
        <h2 style={{fontSize:'24px',fontWeight:300,letterSpacing:'-0.025em',color:th.text,marginBottom:'22px'}}>
          Screen<span style={{fontWeight:700}}>time</span>
        </h2>

        {/* Bank card */}
        <div style={{background:'linear-gradient(135deg,rgba(164,142,232,0.15),rgba(94,196,224,0.09))',border:'1px solid rgba(164,142,232,0.25)',borderRadius:'20px',padding:'22px 24px',marginBottom:'16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <p style={{color:'rgba(164,142,232,0.8)',fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'6px'}}>Screentime Bank</p>
              <p style={{fontSize:'44px',fontWeight:300,color:'#a48ee8',letterSpacing:'-0.05em',lineHeight:1,marginBottom:'4px'}}>{totalBank}<span style={{fontSize:'18px',opacity:0.6}}> min</span></p>
              <p style={{color:th.text2,fontSize:'13px'}}>1 min breathing = 10 min screen</p>
            </div>
            <div style={{background:'rgba(164,142,232,0.12)',border:'1px solid rgba(164,142,232,0.2)',borderRadius:'12px',padding:'10px 14px',textAlign:'center'}}>
              <p style={{color:'#a48ee8',fontSize:'11px',fontWeight:600,marginBottom:'2px'}}>TODAY</p>
              <p style={{color:'#a48ee8',fontSize:'20px',fontWeight:700}}>{trackedApps.length}</p>
              <p style={{color:'rgba(164,142,232,0.7)',fontSize:'10px'}}>apps tracked</p>
            </div>
          </div>
        </div>

        {/* App setup — which to block + daily limit */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
          <p style={{color:th.text3,fontSize:'10px',letterSpacing:'0.1em',textTransform:'uppercase',fontWeight:600}}>App Blocking Setup</p>
          <p style={{color:th.text3,fontSize:'11px'}}>Toggle · Set daily limit</p>
        </div>

        {APPS.map((app,i)=>{
          const on  = !!appEnabled[app.id];
          const lim = appLimits[app.id]||app.limit;
          const ae  = appEarned[app.id]||0;
          const pct = Math.min(100,(ae/Math.max(lim,1))*100);
          return (
            <div key={app.id} className="fade-up" style={{background:th.surf,border:`1px solid ${on?th.borderHi:th.border}`,borderRadius:'16px',marginBottom:'10px',overflow:'hidden',animationDelay:`${i*50}ms`,boxShadow:th.cardShadow,opacity:on?1:0.65,transition:'opacity 0.2s ease,border-color 0.2s ease'}}>
              {/* Header row */}
              <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px'}}>
                <span style={{fontSize:'22px',flexShrink:0}}>{app.emoji}</span>
                <div style={{flex:1}}>
                  <p style={{color:th.text,fontSize:'15px',fontWeight:600}}>{app.name}</p>
                  <p style={{color:th.text2,fontSize:'12px'}}>Block after <span style={{color:on?th.accent:th.text3,fontWeight:600}}>{lim} min</span>/day</p>
                </div>
                <Toggle on={on} onToggle={()=>toggleApp(app.id)} th={th}/>
              </div>

              {on && (
                <>
                  {/* Limit adjuster */}
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',background:th.text4,borderTop:`1px solid ${th.border}`}}>
                    <p style={{color:th.text2,fontSize:'12px',fontWeight:500}}>Daily limit</p>
                    <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                      <button onClick={()=>adjustLimit(app.id,-1)} style={{width:'28px',height:'28px',borderRadius:'50%',background:th.surf,border:`1px solid ${th.border}`,color:th.text,fontSize:'16px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,transition:'background 0.15s ease'}}>−</button>
                      <span style={{color:th.text,fontSize:'15px',fontWeight:700,minWidth:'40px',textAlign:'center'}}>{lim}m</span>
                      <button onClick={()=>adjustLimit(app.id,+1)} style={{width:'28px',height:'28px',borderRadius:'50%',background:th.surf,border:`1px solid ${th.border}`,color:th.text,fontSize:'16px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,transition:'background 0.15s ease'}}>+</button>
                    </div>
                  </div>

                  {/* Earned balance + spend */}
                  <div style={{padding:'12px 16px',borderTop:`1px solid ${th.border}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                      <p style={{color:th.text2,fontSize:'12px'}}>Earned for {app.name}</p>
                      <p style={{color:'#a48ee8',fontSize:'14px',fontWeight:700}}>{ae} min</p>
                    </div>
                    <div style={{height:'4px',background:th.text4,borderRadius:'2px',marginBottom:'10px'}}>
                      <div style={{height:'100%',width:`${pct}%`,borderRadius:'2px',background:'#a48ee8',transition:'width 0.8s ease'}}/>
                    </div>
                    <div style={{display:'flex',gap:'8px'}}>
                      {[10,20,30].map(m=>(
                        <button key={m} onClick={()=>useTime(app.id,m)} style={{flex:1,background:ae>=m?'rgba(164,142,232,0.12)':th.text4,border:`1px solid ${ae>=m?'rgba(164,142,232,0.30)':th.border}`,borderRadius:'8px',padding:'7px',color:ae>=m?'#a48ee8':th.text3,fontSize:'12px',fontWeight:600,cursor:ae>=m?'pointer':'default',opacity:ae>=m?1:0.35,transition:'all 0.2s ease'}}>
                          Use {m}m
                        </button>
                      ))}
                    </div>
                  </div>
                </>
              )}
            </div>
          );
        })}

        {/* How it works */}
        <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'16px',padding:'18px 20px',marginTop:'4px',boxShadow:th.cardShadow}}>
          <p style={{color:th.text,fontSize:'14px',fontWeight:600,marginBottom:'10px'}}>How to enforce on device</p>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {[['📱','iPhone','Settings → Screen Time → App Limits'],['🤖','Android','Digital Wellbeing → App Timers']].map(([ic,dev,step])=>(
              <div key={dev} style={{display:'flex',gap:'10px',alignItems:'flex-start'}}>
                <span style={{fontSize:'16px',flexShrink:0}}>{ic}</span>
                <p style={{color:th.text2,fontSize:'13px',lineHeight:1.5}}><span style={{color:th.text,fontWeight:500}}>{dev}:</span> {step}</p>
              </div>
            ))}
          </div>
          <p style={{color:th.text3,fontSize:'12px',marginTop:'10px',lineHeight:1.5}}>Set limits there matching your settings here. Use earned minutes as your daily extension budget.</p>
        </div>
      </div>
    </div>
  );
}

// ── Nav Icons ─────────────────────────────────────────────────────────────────
const HomeIcon = ({c,a}) => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 9L11 2.5 19 9v10.5a.5.5 0 01-.5.5h-5v-6H8.5v6h-5a.5.5 0 01-.5-.5V9z" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'} strokeLinejoin="round"/></svg>;
const ChartIcon = ({c,a}) => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="13" width="4" height="7" rx="1" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'}/><rect x="9" y="8" width="4" height="12" rx="1" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'}/><rect x="16" y="3" width="4" height="17" rx="1" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'}/></svg>;
const ShieldIcon = ({c,a}) => <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2L4 5v6c0 4.4 3 8.5 7 9.4C15 19.5 18 15.4 18 11V5L11 2z" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'} strokeLinejoin="round"/><path d="M8 11l2 2 4-4" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [data,      setData]      = useState(loadData);
  const [tab,       setTab]       = useState('home');
  const [tech,      setTech]      = useState(null);
  const [sound,     setSound]     = useState(true);
  const [theme,     setTheme]     = useState(()=>loadData().theme||'dark');
  const [switching, setSwitching] = useState(false);
  const [showPrem,  setShowPrem]  = useState(false);
  const [showRem,   setShowRem]   = useState(false);

  const th    = THEMES[theme];
  const isPrem = isPremActive(data.premium);
  const dLeft  = trialLeft(data.premium);
  const hasTr  = data.premium.trial && dLeft > 0;

  const update = useCallback(d => { setData(d); saveData(d); }, []);

  // Theme toggle with transition class
  const toggleTheme = () => {
    setSwitching(true);
    const next = theme==='dark'?'light':'dark';
    setTheme(next);
    update({...data, theme:next});
    setTimeout(()=>setSwitching(false), 420);
  };

  // Check reminder on load
  useEffect(()=>{
    if(!data.reminder?.enabled || Notification.permission!=='granted') return;
    const [rh,rm]=(data.reminder.time||'08:00').split(':').map(Number);
    const now=new Date();
    if(Math.abs(now.getHours()*60+now.getMinutes()-rh*60-rm)<8) {
      new Notification('🌬️ Time to breathe',{body:'Your daily breathing session is waiting.'});
    }
  },[]);

  const handleGate = () => { if(!isPrem) setShowPrem(true); else setTab('screentime'); };

  const handleTrial = () => {
    const d={...data, premium:{...data.premium, trial:true, trialStart:new Date().toISOString()}};
    update(d); setShowPrem(false); setTab('screentime');
  };
  const handleBuy = () => {
    const d={...data, premium:{...data.premium, paid:true}};
    update(d); setShowPrem(false); setTab('screentime');
  };

  const handleDone = (techId, minutes, cycles) => {
    const t = TECHNIQUES.find(x=>x.id===techId);
    const earned = minutes * 10;
    const ae = {...(data.appEarned||{})};
    APPS.forEach(a=>{ ae[a.id]=(ae[a.id]||0)+Math.round(earned/APPS.length); });
    const d={
      ...data,
      sessions:[...data.sessions,{date:todayStr(),technique:techId,duration:minutes,cycles}],
      totalMin:data.totalMin+minutes,
      earnedMin:(data.earnedMin||0)+earned,
      appEarned:ae,
    };
    update(d); setTech(null); setTab('stats');
  };

  const nc = id => tab===id ? th.accent : th.text3;

  return (
    <div className={switching?'theme-transition':''} style={{height:'100dvh',maxWidth:'430px',margin:'0 auto',background:th.bg,display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',transition:switching?'background 0.38s ease':'none'}}>
      {/* ambient bloom */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:'40%',background:`radial-gradient(ellipse at 50% -10%,${th.bloom} 0%,transparent 70%)`,pointerEvents:'none',zIndex:0,transition:switching?'background 0.38s ease':'none'}}/>

      {/* Trial banner */}
      {hasTr && !tech && (
        <div className="fade-down" style={{position:'absolute',top:0,left:0,right:0,zIndex:20,background:'linear-gradient(90deg,#a48ee8,#5ec4e0)',padding:'7px 16px',textAlign:'center'}}>
          <p style={{color:'#fff',fontSize:'12px',fontWeight:600}}>✦ Free Trial — {dLeft} day{dLeft!==1?'s':''} remaining</p>
        </div>
      )}

      {/* Screen */}
      <div style={{flex:1,overflow:'hidden',position:'relative',zIndex:1,marginTop:hasTr&&!tech?'30px':0}}>
        {tech ? (
          <SessionScreen th={th} tech={tech} onDone={handleDone} onBack={()=>setTech(null)} sound={sound}/>
        ) : tab==='home' ? (
          <HomeScreen th={th} data={data} onPick={setTech} onGate={handleGate} onReminder={()=>setShowRem(true)} sound={sound} onSound={()=>setSound(s=>!s)} onTheme={toggleTheme} theme={theme} isPrem={isPrem}/>
        ) : tab==='stats' ? (
          <StatsScreen th={th} data={data}/>
        ) : (
          <ScreentimeScreen th={th} data={data} isPrem={isPrem} onGate={handleGate} onUpdate={update}/>
        )}
      </div>

      {/* Bottom nav */}
      {!tech && (
        <div style={{background:th.navBg,backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',borderTop:`1px solid ${th.border}`,padding:'10px 0 28px',display:'flex',justifyContent:'space-around',position:'relative',zIndex:10,transition:switching?'background 0.38s ease':'none'}}>
          {[
            {id:'home',       label:'Home',      Icon:HomeIcon},
            {id:'stats',      label:'Stats',     Icon:ChartIcon},
            {id:'screentime', label:'Screentime',Icon:ShieldIcon},
          ].map(({id,label,Icon})=>(
            <button key={id} className="nav-btn" onClick={()=>setTab(id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',padding:'4px 18px',position:'relative'}}>
              {id==='screentime'&&!isPrem&&<span style={{position:'absolute',top:'0px',right:'10px',width:'7px',height:'7px',borderRadius:'50%',background:'#a48ee8'}}/>}
              <Icon c={nc(id)} a={tab===id}/>
              <span style={{fontSize:'10px',letterSpacing:'0.06em',textTransform:'uppercase',color:nc(id),fontWeight:tab===id?700:400,transition:'color 0.2s ease'}}>{label}</span>
            </button>
          ))}
        </div>
      )}

      {showPrem  && <PremiumModal th={th} hasTrial={hasTr} onClose={()=>setShowPrem(false)} onTrial={handleTrial} onBuy={handleBuy}/>}
      {showRem   && <ReminderSheet th={th} reminder={data.reminder||{enabled:false,time:'08:00'}} onSave={r=>{update({...data,reminder:r});setShowRem(false);}} onClose={()=>setShowRem(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
