<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>breathe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden}
body{background:#07111e;font-family:'DM Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;color:rgba(255,255,255,0.9);overscroll-behavior:none;touch-action:manipulation}
button{font-family:inherit;outline:none;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
.scroll-area{overflow-y:auto;-webkit-overflow-scrolling:touch;height:100%}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.theme-transition,.theme-transition *{transition:background-color 0.38s ease,color 0.28s ease,border-color 0.32s ease,box-shadow 0.35s ease !important}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.82) translateY(12px)}65%{transform:scale(1.04) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(50px)}to{opacity:1;transform:translateY(0)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes floatDot{0%{opacity:0.8;transform:translate(var(--tx),var(--ty)) scale(1)}100%{opacity:0;transform:translate(var(--tx2),var(--ty2)) scale(0.3)}}
@keyframes countPop{0%{opacity:0;transform:scale(0.7)}60%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes calDotIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes streakPulse{0%,100%{opacity:1}50%{opacity:0.72}}

.fade-up{animation:fadeUp 0.40s cubic-bezier(0.4,0,0.2,1) both}
.fade-down{animation:fadeDown 0.30s ease both}
.scale-in{animation:scaleIn 0.28s cubic-bezier(0.4,0,0.2,1) both}
.pop-in{animation:popIn 0.45s cubic-bezier(0.34,1.2,0.64,1) both}
.slide-up{animation:slideUp 0.36s cubic-bezier(0.4,0,0.2,1) both}

.tap{-webkit-tap-highlight-color:transparent;cursor:pointer;transition:opacity 0.15s ease}
.tap:active{opacity:0.6}
.btn-p{cursor:pointer;transition:transform 0.14s ease,opacity 0.14s ease}
.btn-p:hover{transform:translateY(-1px)}
.btn-p:active{transform:scale(0.97);opacity:0.88}
.btn-s{cursor:pointer;transition:opacity 0.18s ease}
.btn-s:hover{opacity:0.65}
.btn-s:active{opacity:0.4}
.nav-btn{-webkit-tap-highlight-color:transparent;transition:opacity 0.15s ease}
.nav-btn:active{opacity:0.4}
.tech-chip{cursor:pointer;transition:all 0.18s cubic-bezier(0.4,0,0.2,1);-webkit-tap-highlight-color:transparent}
.tech-chip:active{transform:scale(0.95)}
.app-row{transition:background 0.15s ease}
.app-row:active{opacity:0.7}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:floatDot 1.5s ease-out forwards}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

// ── Themes ────────────────────────────────────────────────────────────────────
const THEMES={
  dark:{
    id:'dark',bg:'#07111e',surf:'#0c1d30',card:'#101f32',
    border:'rgba(255,255,255,0.08)',borderHi:'rgba(255,255,255,0.16)',
    text:'rgba(255,255,255,0.92)',text2:'rgba(255,255,255,0.48)',
    label:'rgba(255,255,255,0.28)',text4:'rgba(255,255,255,0.09)',
    teal:'#4fcdd8',earned:'#4fcdd8',spent:'rgba(255,255,255,0.40)',
    sealed:'rgba(220,90,90,0.80)',navBg:'rgba(7,17,30,0.96)',
    overlay:'rgba(0,0,0,0.75)',btnBg:'rgba(44,92,152,0.75)',
    cardShadow:'none',toggleTrack:'rgba(255,255,255,0.10)',
  },
  light:{
    id:'light',bg:'#e8f0ff',surf:'rgba(255,255,255,1)',card:'rgba(255,255,255,1)',
    border:'rgba(30,60,140,0.14)',borderHi:'rgba(30,60,140,0.28)',
    text:'rgba(6,16,40,0.92)',text2:'rgba(6,16,40,0.52)',
    label:'rgba(6,16,40,0.38)',text4:'rgba(6,16,40,0.09)',
    teal:'#0891b2',earned:'#0891b2',spent:'rgba(6,16,40,0.40)',
    sealed:'rgba(200,50,50,0.80)',navBg:'rgba(232,240,255,0.97)',
    overlay:'rgba(0,0,0,0.52)',btnBg:'#1d4ed8',
    cardShadow:'0 2px 10px rgba(20,50,120,0.08),0 0 0 1px rgba(30,60,140,0.09)',
    toggleTrack:'rgba(6,16,40,0.12)',
  },
};

// ── Data ──────────────────────────────────────────────────────────────────────
const TECHNIQUES=[
  {id:'box',     name:'box',     tag:'4·4·4·4',accent:'#5ec4e0',tagBg:'rgba(94,196,224,0.12)', bg:'linear-gradient(145deg,#0a1e40,#0b2955)',desc:'Navy SEALs use this to stay sharp under pressure.',   phases:[{l:'Inhale',d:4},{l:'Hold',d:4},{l:'Exhale',d:4},{l:'Hold',d:4}]},
  {id:'478',     name:'4·7·8',   tag:'4·7·8',  accent:'#a48ee8',tagBg:'rgba(164,142,232,0.12)',bg:'linear-gradient(145deg,#150e3a,#1f1350)',desc:'Extended exhale calms the nervous system for deep rest.',phases:[{l:'Inhale',d:4},{l:'Hold',d:7},{l:'Exhale',d:8}]},
  {id:'calm',    name:'calm',    tag:'2·1·4·1',accent:'#4dbfae',tagBg:'rgba(77,191,174,0.12)', bg:'linear-gradient(145deg,#082624,#0e3432)',desc:'Longer exhale activates the vagus nerve instantly.',     phases:[{l:'Inhale',d:2},{l:'Hold',d:1},{l:'Exhale',d:4},{l:'Hold',d:1}]},
  {id:'energize',name:'energize',tag:'6·2',    accent:'#e8a23c',tagBg:'rgba(232,162,60,0.12)', bg:'linear-gradient(145deg,#281600,#3c2000)',desc:'Floods the brain with oxygen for instant clarity.',      phases:[{l:'Inhale',d:6},{l:'Exhale',d:2}]},
];
const APPS=[
  {id:'instagram',name:'instagram',initials:'in',color:'#d63e74',limit:30},
  {id:'tiktok',   name:'tiktok',   initials:'tt',color:'#222',   limit:30},
  {id:'youtube',  name:'youtube',  initials:'yt',color:'#cc2200',limit:60},
  {id:'twitter',  name:'x',        initials:'x', color:'#1a8cd8',limit:30},
];
const LIMIT_STEPS=[5,10,15,20,30,45,60,90,120];

// ── Audio ─────────────────────────────────────────────────────────────────────
let _ctx=null,_ag=null,_ao=[];
const getCtx=()=>{if(!_ctx)_ctx=new(window.AudioContext||window.webkitAudioContext)();if(_ctx.state==='suspended')_ctx.resume();return _ctx;};
function playBell(f){try{const ctx=getCtx(),t=ctx.currentTime,o=ctx.createOscillator(),e=ctx.createGain();o.type='sine';o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.72,t+1.6);e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(0.11,t+0.04);e.gain.exponentialRampToValueAtTime(0.001,t+1.9);o.connect(e);e.connect(ctx.destination);o.start(t);o.stop(t+1.9);}catch(e){}}
const phaseSound=l=>playBell({Inhale:528,Hold:396,Exhale:432}[l]||528);
function startAmbient(){try{stopAmbient();const ctx=getCtx(),m=ctx.createGain();m.gain.setValueAtTime(0,ctx.currentTime);m.gain.linearRampToValueAtTime(0.028,ctx.currentTime+2.5);m.connect(ctx.destination);_ag=m;_ao=[];[[110,1],[220.12,0.28],[165.06,0.18]].forEach(([f,g])=>{const o=ctx.createOscillator(),gn=ctx.createGain();o.type='sine';o.frequency.value=f;gn.gain.value=g;o.connect(gn);gn.connect(m);o.start();_ao.push(o);});}catch(e){}}
function stopAmbient(){try{if(_ag&&_ctx){_ag.gain.linearRampToValueAtTime(0,_ctx.currentTime+1.2);const o=[..._ao];setTimeout(()=>o.forEach(x=>{try{x.stop();}catch(e){}}),1400);_ao=[];_ag=null;}}catch(e){}}

// ── Storage ───────────────────────────────────────────────────────────────────
const SK='breathe_v6';
const DEF={sessions:[],totalMin:0,earnedMin:0,spentMin:0,appEarned:{},appLimits:{},appEnabled:{instagram:true,tiktok:true,youtube:false,twitter:false},premium:{paid:false,trial:false,trialStart:null},reminder:{enabled:false,time:'08:00'},theme:'dark'};
const loadData=()=>{try{return{...DEF,...JSON.parse(localStorage.getItem(SK))};}catch(e){return{...DEF};}};
const saveData=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}};
const todayStr=()=>new Date().toISOString().slice(0,10);
const calcStreak=s=>{const days=[...new Set(s.map(x=>x.date))].sort().reverse();if(!days.length||days[0]!==todayStr())return 0;let n=1;for(let i=1;i<days.length;i++){if(Math.round((new Date(days[i-1])-new Date(days[i]))/86400000)===1)n++;else break;}return n;};
const last7=sessions=>Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));const date=d.toISOString().slice(0,10);return{date,label:d.toLocaleDateString('en',{weekday:'narrow'}),isToday:i===6,count:sessions.filter(s=>s.date===date).length};});
const isPremActive=p=>p.paid||(p.trial&&p.trialStart&&(Date.now()-new Date(p.trialStart))/86400000<7);
const trialLeft=p=>!p.trial||!p.trialStart?0:Math.max(0,7-Math.floor((Date.now()-new Date(p.trialStart))/86400000));
const nextStep=(v,dir)=>{const i=LIMIT_STEPS.indexOf(v);if(i===-1)return dir>0?LIMIT_STEPS[1]:LIMIT_STEPS[0];return LIMIT_STEPS[Math.max(0,Math.min(LIMIT_STEPS.length-1,i+dir))];};

// ── Helpers ───────────────────────────────────────────────────────────────────
const fmtHHMM=m=>{const h=Math.floor(m/60),mn=m%60;return`${String(h).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;};
function orbProps(l,dur,ld){if(l==='Inhale')return{scale:1.26,glow:0.72,dur};if(l==='Exhale')return{scale:0.68,glow:0.10,dur};return ld==='in'?{scale:1.26,glow:0.50,dur:0.45}:{scale:0.68,glow:0.07,dur:0.45};}
function glowShadow(a,g){const h=n=>Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');return`0 0 ${Math.round(g*52)}px ${a}${h(g*210)},0 0 ${Math.round(g*96)}px ${a}${h(g*65)}`;}

// ── Shared components ─────────────────────────────────────────────────────────
function Toggle({on,onToggle,th}){
  return<div onClick={onToggle} style={{width:'44px',height:'26px',borderRadius:'13px',background:on?th.teal:th.toggleTrack,position:'relative',cursor:'pointer',flexShrink:0,transition:'background 0.25s ease'}}>
    <div style={{position:'absolute',top:'3px',left:on?'21px':'3px',width:'20px',height:'20px',borderRadius:'50%',background:'#fff',transition:'left 0.25s cubic-bezier(0.34,1.3,0.64,1)',boxShadow:'0 1px 4px rgba(0,0,0,0.3)'}}/>
  </div>;
}

// ── PremiumModal ──────────────────────────────────────────────────────────────
function PremiumModal({th,hasTrial,onClose,onTrial,onBuy}){
  return<div style={{position:'fixed',inset:0,background:th.overlay,display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:900,animation:'overlayIn 0.22s ease'}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:'430px',background:th.id==='dark'?'#0d1b36':'#fff',borderRadius:'28px 28px 0 0',padding:'32px 24px 48px',animation:'slideUp 0.36s cubic-bezier(0.4,0,0.2,1)',border:`1px solid ${th.border}`,borderBottom:'none'}}>
      <div style={{width:'40px',height:'4px',borderRadius:'2px',background:th.text4,margin:'0 auto 28px'}}/>
      <div style={{textAlign:'center',marginBottom:'22px'}}>
        <div style={{width:'56px',height:'56px',borderRadius:'18px',margin:'0 auto 14px',background:'linear-gradient(135deg,#a48ee8,#5ec4e0)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',boxShadow:'0 8px 28px rgba(164,142,232,0.4)'}}>✦</div>
        <h2 style={{color:th.text,fontSize:'22px',fontWeight:700,letterSpacing:'-0.025em',marginBottom:'8px'}}>unlock premium</h2>
        <p style={{color:th.text2,fontSize:'14px',lineHeight:1.55}}>breathe your way to more time.<br/>block apps. earn screentime back.</p>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'8px',marginBottom:'22px'}}>
        {[['⏱','1 min breathing = 10 min screentime'],['🔒','block instagram, tiktok, youtube, x'],['🔔','daily reminders & streak protection'],['📊','session analytics']].map(([ic,tx],i)=>(
          <div key={i} style={{display:'flex',alignItems:'center',gap:'12px',background:th.text4,border:`1px solid ${th.border}`,borderRadius:'12px',padding:'12px 14px'}}>
            <span style={{fontSize:'16px',flexShrink:0}}>{ic}</span><p style={{color:th.text,fontSize:'13px'}}>{tx}</p>
          </div>
        ))}
      </div>
      {!hasTrial&&<button className="btn-p" onClick={onTrial} style={{width:'100%',background:'linear-gradient(135deg,#a48ee8,#5ec4e0)',border:'none',borderRadius:'14px',padding:'16px',color:'#fff',fontSize:'16px',fontWeight:700,marginBottom:'10px',boxShadow:'0 6px 24px rgba(164,142,232,0.4)'}}>start 7-day free trial</button>}
      <button className="btn-p" onClick={onBuy} style={{width:'100%',background:hasTrial?'linear-gradient(135deg,#a48ee8,#5ec4e0)':th.text4,border:hasTrial?'none':`1px solid ${th.border}`,borderRadius:'14px',padding:'15px',color:hasTrial?'#fff':th.text2,fontSize:'15px',fontWeight:600,marginBottom:'12px',boxShadow:hasTrial?'0 6px 24px rgba(164,142,232,0.4)':'none'}}>{hasTrial?'upgrade — $4.99/mo':'$4.99/month  ·  $29.99/year'}</button>
      <p style={{color:th.label,fontSize:'11px',textAlign:'center'}}>cancel anytime · no ads</p>
    </div>
  </div>;
}

// ── ReminderSheet ─────────────────────────────────────────────────────────────
function ReminderSheet({th,reminder,onSave,onClose}){
  const[on,setOn]=useState(reminder.enabled);
  const[t,setTime]=useState(reminder.time||'08:00');
  const save=()=>{if(on){Notification.requestPermission().then(p=>onSave({enabled:p==='granted',time:t}));}else onSave({enabled:false,time:t});};
  return<div style={{position:'fixed',inset:0,background:th.overlay,display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:900,animation:'overlayIn 0.22s ease'}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:'430px',background:th.id==='dark'?'#0d1b36':'#fff',borderRadius:'28px 28px 0 0',padding:'28px 24px 48px',animation:'slideUp 0.36s cubic-bezier(0.4,0,0.2,1)',border:`1px solid ${th.border}`,borderBottom:'none'}}>
      <div style={{width:'40px',height:'4px',borderRadius:'2px',background:th.text4,margin:'0 auto 24px'}}/>
      <h3 style={{color:th.text,fontSize:'19px',fontWeight:700,marginBottom:'6px'}}>daily reminder</h3>
      <p style={{color:th.text2,fontSize:'13px',marginBottom:'20px'}}>get notified each day to breathe.</p>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:th.text4,border:`1px solid ${th.border}`,borderRadius:'12px',padding:'14px 16px',marginBottom:'10px'}}>
        <div><p style={{color:th.text,fontSize:'14px',fontWeight:500}}>enable reminder</p><p style={{color:th.text2,fontSize:'12px'}}>requires notification permission</p></div>
        <Toggle on={on} onToggle={()=>setOn(x=>!x)} th={th}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:th.text4,border:`1px solid ${th.border}`,borderRadius:'12px',padding:'14px 16px',marginBottom:'22px',opacity:on?1:0.4,transition:'opacity 0.2s'}}>
        <p style={{color:th.text,fontSize:'14px',fontWeight:500}}>time</p>
        <input type="time" value={t} onChange={e=>setTime(e.target.value)} disabled={!on} style={{background:'none',border:'none',color:th.teal,fontSize:'16px',fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}/>
      </div>
      <button className="btn-p" onClick={save} style={{width:'100%',background:th.teal,color:'#07111e',border:'none',borderRadius:'12px',padding:'15px',fontSize:'15px',fontWeight:700}}>save</button>
    </div>
  </div>;
}

// ── SessionComplete ───────────────────────────────────────────────────────────
function SessionComplete({th,tech,cycles,minutes,onContinue}){
  const earned=minutes*10;
  return<div style={{position:'fixed',inset:0,background:th.overlay,display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:'24px',animation:'overlayIn 0.28s ease'}}>
    <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:'360px',background:th.id==='dark'?'#0d1b36':'#fff',borderRadius:'24px',padding:'32px 24px',border:`1px solid ${th.border}`,animation:'popIn 0.5s cubic-bezier(0.34,1.2,0.64,1)',textAlign:'center'}}>
      <div style={{width:'56px',height:'56px',borderRadius:'50%',margin:'0 auto 16px',background:`linear-gradient(135deg,${tech.accent}22,${tech.accent}44)`,border:`2px solid ${tech.accent}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px'}}>✦</div>
      <h3 style={{color:th.text,fontSize:'19px',fontWeight:700,marginBottom:'4px'}}>session complete</h3>
      <p style={{color:th.text2,fontSize:'13px',marginBottom:'20px'}}>{tech.name}</p>
      <div style={{display:'flex',gap:'10px',marginBottom:'20px'}}>
        {[{l:'cycles',v:cycles||0},{l:'minutes',v:minutes},{l:'earned',v:`+${earned}m`,hi:true}].map(s=>(
          <div key={s.l} style={{flex:1,background:th.text4,borderRadius:'12px',padding:'13px 8px',border:`1px solid ${th.border}`}}>
            <p style={{color:th.label,fontSize:'9px',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:'4px'}}>{s.l}</p>
            <p style={{color:s.hi?tech.accent:th.text,fontSize:'22px',fontWeight:700,letterSpacing:'-0.02em'}}>{s.v}</p>
          </div>
        ))}
      </div>
      <button className="btn-p" onClick={onContinue} style={{width:'100%',background:tech.accent,color:'#07111e',border:'none',borderRadius:'12px',padding:'14px',fontSize:'15px',fontWeight:700,boxShadow:`0 4px 20px ${tech.accent}44`}}>continue</button>
    </div>
  </div>;
}

// ── SessionScreen ─────────────────────────────────────────────────────────────
function SessionScreen({th,tech,onDone,onBack,sound}){
  const[running,setRunning]=useState(false);
  const[phaseIdx,setPhaseIdx]=useState(0);
  const[count,setCount]=useState(tech.phases[0].d);
  const[cycles,setCycles]=useState(0);
  const[lastDir,setLastDir]=useState('neutral');
  const[particles,setParticles]=useState([]);
  const[showComp,setShowComp]=useState(false);
  const[sessMin,setSessMin]=useState(1);
  const startRef=useRef(null);const pid=useRef(0);

  const phase=tech.phases[phaseIdx];
  const orb=running?orbProps(phase.l,phase.d,lastDir):{scale:0.82,glow:0.14,dur:0.9};
  const isHold=running&&phase.l==='Hold';

  useEffect(()=>{if(!running||phase.l!=='Inhale')return;const iv=setInterval(()=>{const id=++pid.current;const angle=Math.random()*360;const r=90+Math.random()*35;const tx=`${Math.cos(angle*Math.PI/180)*r}px`;const ty=`${Math.sin(angle*Math.PI/180)*r}px`;const tx2=`${Math.cos(angle*Math.PI/180)*(r+30)}px`;const ty2=`${Math.sin(angle*Math.PI/180)*(r+30)}px`;const sz=2+Math.random()*3;setParticles(p=>[...p.slice(-10),{id,tx,ty,tx2,ty2,sz}]);setTimeout(()=>setParticles(p=>p.filter(x=>x.id!==id)),1600);},380);return()=>clearInterval(iv);},[running,phaseIdx]);

  useEffect(()=>{if(!running)return;const p=tech.phases[phaseIdx];if(p.l==='Inhale')setLastDir('in');else if(p.l==='Exhale')setLastDir('out');if(sound)phaseSound(p.l);setCount(p.d);let c=p.d;const iv=setInterval(()=>{c--;setCount(c);if(c<=0)clearInterval(iv);},1000);const tm=setTimeout(()=>{const next=(phaseIdx+1)%tech.phases.length;if(next===0)setCycles(n=>n+1);setPhaseIdx(next);},p.d*1000);return()=>{clearInterval(iv);clearTimeout(tm);};},[phaseIdx,running]);

  useEffect(()=>()=>stopAmbient(),[]);

  const handleStart=()=>{startRef.current=Date.now();setRunning(true);if(sound)startAmbient();};
  const handleEnd=()=>{stopAmbient();setRunning(false);const m=Math.max(1,Math.round((Date.now()-(startRef.current||Date.now()))/60000));setSessMin(m);setShowComp(true);};
  const handleContinue=()=>{setShowComp(false);onDone(tech.id,sessMin,cycles);};

  return<div className="scale-in" style={{height:'100%',display:'flex',flexDirection:'column',background:th.bg}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'50px 20px 12px'}}>
      <button onClick={onBack} style={{background:th.text4,border:`1px solid ${th.border}`,borderRadius:'10px',color:th.text2,padding:'8px 14px',fontSize:'13px',cursor:'pointer'}}>← back</button>
      <p style={{color:tech.accent,fontSize:'12px',fontWeight:600,letterSpacing:'0.06em'}}>{tech.name}</p>
      <div style={{background:th.text4,border:`1px solid ${th.border}`,borderRadius:'10px',color:th.text2,padding:'8px 14px',fontSize:'12px',minWidth:'52px',textAlign:'center'}}>

  // today timeline
  const nowHour=new Date().getHours();
  const activeHours=new Set(todaySess.map(s=>s.hour!=null?s.hour:nowHour).filter(h=>h>=TL_START&&h<TL_END));

  // technique counts
  const tc={};data.sessions.forEach(s=>{tc[s.technique]=(tc[s.technique]||0)+1;});
  const maxTc=Math.max(...Object.values(tc),1);

  // best streak
  const allDays=[...new Set(data.sessions.map(s=>s.date))].sort().reverse();

        <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',overflow:'hidden',boxShadow:th.cardShadow}}>
          {days.map((d,i)=>{
            const pct=Math.min(100,(d.count/GOAL)*100);
            return<div key={d.date} style={{display:'flex',alignItems:'center',gap:'13px',padding:'11px 15px',borderBottom:i<days.length-1?`1px solid ${th.border}`:'none'}}>
              <p style={{color:d.isToday?th.teal:th.text2,fontSize:'12px',fontWeight:d.isToday?600:400,width:'26px',flexShrink:0}}>{d.label}</p>
              <div style={{flex:1,height:'4px',background:th.text4,borderRadius:'2px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,borderRadius:'2px',background:d.count>=GOAL?th.teal:d.count>0?`${th.teal}60`:'transparent',transition:'width 0.8s ease'}}/>
              </div>
              <p style={{color:d.count>0?th.teal:th.label,fontSize:'12px',fontWeight:d.count>0?600:400,width:'14px',textAlign:'right',flexShrink:0}}>{d.count>0?d.count:'·'}</p>
            </div>;
          })}
        </div>
      </div>

      {/* TECHNIQUES — list rows like locked apps */}
      {Object.keys(tc).length>0&&<div style={{marginBottom:'14px'}}>
        <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.16em',textTransform:'uppercase',fontWeight:500,marginBottom:'10px'}}>TECHNIQUES</p>
        <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',overflow:'hidden',boxShadow:th.cardShadow}}>
          {TECHNIQUES.filter(t=>tc[t.id]).sort((a,b)=>(tc[b.id]||0)-(tc[a.id]||0)).map((t,i,arr)=>{
            const count=tc[t.id]||0;
            const pct=Math.min(100,(count/maxTc)*100);
            return<div key={t.id} style={{display:'flex',alignItems:'center',gap:'12px',padding:'12px 15px',borderBottom:i<arr.length-1?`1px solid ${th.border}`:'none'}}>
              <div style={{width:'8px',height:'8px',borderRadius:'50%',background:t.accent,flexShrink:0}}/>
              <p style={{color:th.text,fontSize:'13px',fontWeight:500,width:'68px',flexShrink:0}}>{t.name}</p>
              <div style={{flex:1,height:'4px',background:th.text4,borderRadius:'2px',overflow:'hidden'}}>
                <div style={{height:'100%',width:`${pct}%`,borderRadius:'2px',background:t.accent,transition:'width 0.8s ease'}}/>
              </div>
              <p style={{color:th.text2,fontSize:'12px',width:'22px',textAlign:'right',flexShrink:0}}>{count}</p>
            </div>;
          })}
        </div>
      </div>}

      {/* TODAY'S GOAL */}
      <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',padding:'14px 16px',marginBottom:'12px',boxShadow:th.cardShadow}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:'9px'}}>
          <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.14em',textTransform:'uppercase',fontWeight:500}}>TODAY'S GOAL</p>
          <p style={{color:th.label,fontSize:'12px'}}>{todayCount} / {GOAL} sessions</p>
        </div>
        <div style={{height:'4px',background:th.text4,borderRadius:'2px'}}>
          <div style={{height:'100%',borderRadius:'2px',width:`${Math.min(100,(todayCount/GOAL)*100)}%`,background:todayCount>=GOAL?'#4dbfae':th.teal,transition:'width 1s cubic-bezier(0.4,0,0.2,1)'}}/>
        </div>
      </div>

      {data.sessions.length===0&&<div style={{textAlign:'center',padding:'36px 20px',color:th.label,fontSize:'13px'}}>
        <p style={{fontSize:'32px',marginBottom:'12px'}}>🌬️</p>complete your first session to see progress here.
      </div>}
    </div>
  </div>;
}

// ── ScreentimeScreen ──────────────────────────────────────────────────────────
function ScreentimeScreen({th,data,isPrem,onGate,onUpdate}){
  const earned=data.earnedMin||0;
  const appEnabled=data.appEnabled||{instagram:true,tiktok:true,youtube:false,twitter:false};
  const appLimits=data.appLimits||{instagram:30,tiktok:30,youtube:60,twitter:30};
  const appEarned=data.appEarned||{};

  const toggleApp=id=>{const ae={...appEnabled,[id]:!appEnabled[id]};onUpdate({...data,appEnabled:ae});};
  const adjustLimit=(id,dir)=>{const lim={...appLimits,[id]:nextStep(appLimits[id]||30,dir)};onUpdate({...data,appLimits:lim});};
  const useTime=(id,min)=>{const ae={...appEarned};if((ae[id]||0)<min)return;ae[id]=(ae[id]||0)-min;onUpdate({...data,appEarned:ae,spentMin:(data.spentMin||0)+min});};

  if(!isPrem)return(
    <div className="fade-up" style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',textAlign:'center'}}>
      <div style={{width:'68px',height:'68px',borderRadius:'22px',margin:'0 auto 20px',background:'linear-gradient(135deg,rgba(164,142,232,0.18),rgba(94,196,224,0.13))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px',border:'1px solid rgba(164,142,232,0.28)'}}>🔒</div>
      <h3 style={{color:th.text,fontSize:'19px',fontWeight:700,marginBottom:'10px',letterSpacing:'-0.02em'}}>screentime control</h3>
      <p style={{color:th.text2,fontSize:'14px',lineHeight:1.65,marginBottom:'28px'}}>block instagram, tiktok, youtube and more. earn screentime back by breathing.</p>
      <button className="btn-p" onClick={onGate} style={{background:'linear-gradient(135deg,#a48ee8,#5ec4e0)',border:'none',borderRadius:'50px',padding:'15px 38px',color:'#fff',fontSize:'15px',fontWeight:700,boxShadow:'0 6px 24px rgba(164,142,232,0.35)'}}>unlock premium</button>
    </div>
  );

  return<div className="scroll-area fade-up" style={{paddingBottom:'88px'}}>
    <div style={{padding:'0 20px',paddingTop:'52px'}}>
      <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.16em',textTransform:'uppercase',fontWeight:500,marginBottom:'8px'}}>SCREENTIME</p>
      <div style={{display:'flex',alignItems:'baseline',gap:'6px',marginBottom:'20px'}}>
        <span style={{fontSize:'52px',fontWeight:300,color:th.text,letterSpacing:'-0.04em',fontVariantNumeric:'tabular-nums'}}>{fmtHHMM(earned)}</span>
        <span style={{color:th.text2,fontSize:'14px',marginBottom:'4px'}}>min banked</span>
      </div>

      {/* Bank card */}
      <div style={{background:'linear-gradient(135deg,rgba(164,142,232,0.13),rgba(94,196,224,0.07))',border:'1px solid rgba(164,142,232,0.20)',borderRadius:'14px',padding:'17px 18px',marginBottom:'16px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <p style={{color:'rgba(164,142,232,0.70)',fontSize:'10px',letterSpacing:'0.13em',textTransform:'uppercase',marginBottom:'6px'}}>POOL BALANCE</p>
            <p style={{fontSize:'32px',fontWeight:300,color:'#a48ee8',letterSpacing:'-0.04em',fontVariantNumeric:'tabular-nums'}}>{fmtHHMM(earned)}</p>
            <p style={{color:th.text2,fontSize:'12px',marginTop:'3px'}}>1 min breathing = 10 min screen</p>
          </div>
          <div style={{background:'rgba(164,142,232,0.10)',border:'1px solid rgba(164,142,232,0.17)',borderRadius:'12px',padding:'10px 14px',textAlign:'center'}}>
            <p style={{color:'rgba(164,142,232,0.65)',fontSize:'10px',letterSpacing:'0.08em',marginBottom:'3px'}}>APPS</p>
            <p style={{color:'#a48ee8',fontSize:'22px',fontWeight:700}}>{APPS.filter(a=>appEnabled[a.id]).length}</p>
            <p style={{color:'rgba(164,142,232,0.45)',fontSize:'10px'}}>locked</p>
          </div>
        </div>
      </div>

      <p style={{color:th.label,fontSize:'10px',letterSpacing:'0.16em',textTransform:'uppercase',fontWeight:500,marginBottom:'10px'}}>APP BLOCKING</p>

      {APPS.map((app,i)=>{
        const on=!!appEnabled[app.id];
        const lim=appLimits[app.id]||app.limit;
        const ae=appEarned[app.id]||0;
        const pct=Math.min(100,(ae/Math.max(lim,1))*100);
        return<div key={app.id} className="fade-up" style={{background:th.surf,border:`1px solid ${on?th.borderHi:th.border}`,borderRadius:'13px',marginBottom:'10px',overflow:'hidden',animationDelay:`${i*45}ms`,opacity:on?1:0.62,transition:'opacity 0.2s,border-color 0.2s',boxShadow:th.cardShadow}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px',padding:'13px 15px'}}>
            <div style={{width:'38px',height:'38px',borderRadius:'10px',background:app.color,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <span style={{color:'rgba(255,255,255,0.92)',fontSize:'11px',fontWeight:700}}>{app.initials}</span>
            </div>
            <div style={{flex:1}}>
              <p style={{color:th.text,fontSize:'14px',fontWeight:500}}>{app.name}</p>
              <p style={{color:th.text2,fontSize:'12px'}}>block after <span style={{color:on?th.teal:th.label,fontWeight:500}}>{lim}m</span>/day</p>
            </div>
            <Toggle on={on} onToggle={()=>toggleApp(app.id)} th={th}/>
          </div>
          {on&&<>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 15px',background:th.text4,borderTop:`1px solid ${th.border}`}}>
              <p style={{color:th.text2,fontSize:'12px'}}>daily limit</p>
              <div style={{display:'flex',alignItems:'center',gap:'11px'}}>
                <button onClick={()=>adjustLimit(app.id,-1)} style={{width:'26px',height:'26px',borderRadius:'50%',background:th.surf,border:`1px solid ${th.border}`,color:th.text,fontSize:'15px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>−</button>
                <span style={{color:th.text,fontSize:'14px',fontWeight:700,minWidth:'36px',textAlign:'center'}}>{lim}m</span>
                <button onClick={()=>adjustLimit(app.id,+1)} style={{width:'26px',height:'26px',borderRadius:'50%',background:th.surf,border:`1px solid ${th.border}`,color:th.text,fontSize:'15px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
              </div>
            </div>
            <div style={{padding:'11px 15px',borderTop:`1px solid ${th.border}`}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:'7px'}}>
                <p style={{color:th.text2,fontSize:'12px'}}>earned for {app.name}</p>
                <p style={{color:'#a48ee8',fontSize:'13px',fontWeight:700}}>{ae} min</p>
              </div>
              <div style={{height:'3px',background:th.text4,borderRadius:'2px',marginBottom:'9px'}}>
                <div style={{height:'100%',width:`${pct}%`,borderRadius:'2px',background:'#a48ee8',transition:'width 0.8s ease'}}/>
              </div>
              <div style={{display:'flex',gap:'7px'}}>
                {[10,20,30].map(m=><button key={m} onClick={()=>useTime(app.id,m)} style={{flex:1,background:ae>=m?'rgba(164,142,232,0.10)':th.text4,border:`1px solid ${ae>=m?'rgba(164,142,232,0.24)':th.border}`,borderRadius:'8px',padding:'7px',color:ae>=m?'#a48ee8':th.label,fontSize:'12px',fontWeight:600,cursor:ae>=m?'pointer':'default',opacity:ae>=m?1:0.35,transition:'all 0.18s'}}>use {m}m</button>)}
              </div>
            </div>
          </>}
        </div>;
      })}

      <div style={{background:th.surf,border:`1px solid ${th.border}`,borderRadius:'13px',padding:'15px 17px',boxShadow:th.cardShadow}}>
        <p style={{color:th.text,fontSize:'13px',fontWeight:500,marginBottom:'9px'}}>enforce on device</p>
        {[['📱','iPhone','Settings → Screen Time → App Limits'],['🤖','Android','Digital Wellbeing → App Timers']].map(([ic,d,s])=>(
          <div key={d} style={{display:'flex',gap:'10px',alignItems:'flex-start',marginBottom:'5px'}}>
            <span style={{fontSize:'14px',flexShrink:0}}>{ic}</span>
            <p style={{color:th.text2,fontSize:'12px',lineHeight:1.5}}><span style={{color:th.text,fontWeight:500}}>{d}:</span> {s}</p>
          </div>
        ))}
      </div>
    </div>
  </div>;
}

// ── Nav Icons ─────────────────────────────────────────────────────────────────
const HomeIcon=({c,a})=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 9L11 2.5 19 9v10.5a.5.5 0 01-.5.5h-5v-6H8.5v6h-5a.5.5 0 01-.5-.5V9z" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'} strokeLinejoin="round"/></svg>;
const ChartIcon=({c,a})=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="13" width="4" height="7" rx="1" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'}/><rect x="9" y="8" width="4" height="12" rx="1" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'}/><rect x="16" y="3" width="4" height="17" rx="1" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'}/></svg>;
const ShieldIcon=({c,a})=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2L4 5v6c0 4.4 3 8.5 7 9.4C15 19.5 18 15.4 18 11V5L11 2z" stroke={c} strokeWidth="1.5" fill={a?`${c}15`:'none'} strokeLinejoin="round"/><path d="M8 11l2 2 4-4" stroke={c} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(loadData);
  const[tab,setTab]=useState('home');
  const[tech,setTech]=useState(null);
  const[selTech,setSelTech]=useState(TECHNIQUES[0]);
  const[sound,setSound]=useState(true);
  const[theme,setTheme]=useState(()=>loadData().theme||'dark');
  const[switching,setSwitching]=useState(false);
  const[showPrem,setShowPrem]=useState(false);
  const[showRem,setShowRem]=useState(false);

  const th=THEMES[theme];
  const isPrem=isPremActive(data.premium);
  const dLeft=trialLeft(data.premium);
  const hasTr=data.premium.trial&&dLeft>0;
  const update=useCallback(d=>{setData(d);saveData(d);},[]);

  const toggleTheme=()=>{setSwitching(true);const next=theme==='dark'?'light':'dark';setTheme(next);update({...data,theme:next});setTimeout(()=>setSwitching(false),420);};

  useEffect(()=>{if(!data.reminder?.enabled||Notification.permission!=='granted')return;const[rh,rm]=(data.reminder.time||'08:00').split(':').map(Number);const now=new Date();if(Math.abs(now.getHours()*60+now.getMinutes()-rh*60-rm)<8)new Notification('🌬️ time to breathe',{body:'Your daily session is waiting.'});},[]);

  const handleGate=()=>{if(!isPrem)setShowPrem(true);else setTab('screentime');};
  const handleTrial=()=>{const d={...data,premium:{...data.premium,trial:true,trialStart:new Date().toISOString()}};update(d);setShowPrem(false);setTab('screentime');};
  const handleBuy=()=>{const d={...data,premium:{...data.premium,paid:true}};update(d);setShowPrem(false);setTab('screentime');};

  const handleDone=(techId,minutes,cycles)=>{
    const earned=minutes*10;
    const ae={...(data.appEarned||{})};
    const ids=APPS.filter(a=>data.appEnabled?.[a.id]).map(a=>a.id);
    ids.forEach(id=>{ae[id]=(ae[id]||0)+Math.round(earned/Math.max(ids.length,1));});
    const d={...data,sessions:[...data.sessions,{date:todayStr(),technique:techId,duration:minutes,cycles,hour:new Date().getHours(),ts:Date.now()}],totalMin:data.totalMin+minutes,earnedMin:(data.earnedMin||0)+earned,appEarned:ae};
    update(d);setTech(null);setTab('stats');
  };

  const nc=id=>tab===id?th.teal:th.label;

  return<div className={switching?'theme-transition':''} style={{height:'100dvh',maxWidth:'430px',margin:'0 auto',background:th.bg,display:'flex',flexDirection:'column',position:'relative',overflow:'hidden',transition:switching?'background 0.38s ease':'none'}}>
    <div style={{position:'absolute',top:0,left:0,right:0,height:'35%',background:`radial-gradient(ellipse at 50% -10%,${th.id==='dark'?'rgba(79,205,216,0.04)':'rgba(8,145,178,0.04)'} 0%,transparent 70%)`,pointerEvents:'none',zIndex:0}}/>

    {hasTr&&!tech&&<div className="fade-down" style={{position:'absolute',top:0,left:0,right:0,zIndex:20,background:'linear-gradient(90deg,#a48ee8,#5ec4e0)',padding:'7px 16px',textAlign:'center'}}><p style={{color:'#fff',fontSize:'12px',fontWeight:600}}>✦ free trial — {dLeft} day{dLeft!==1?'s':''} remaining</p></div>}

    <div style={{flex:1,overflow:'hidden',position:'relative',zIndex:1,marginTop:hasTr&&!tech?'30px':0}}>
      {tech?(
        <SessionScreen th={th} tech={tech} onDone={handleDone} onBack={()=>setTech(null)} sound={sound}/>
      ):tab==='home'?(
        <HomeScreen th={th} data={data} onPick={setTech} onGate={handleGate} onReminder={()=>setShowRem(true)} sound={sound} onSound={()=>setSound(s=>!s)} onTheme={toggleTheme} theme={theme} isPrem={isPrem} selTech={selTech} onSelTech={setSelTech}/>
      ):tab==='stats'?(
        <StatsScreen th={th} data={data}/>
      ):(
        <ScreentimeScreen th={th} data={data} isPrem={isPrem} onGate={handleGate} onUpdate={update}/>
      )}
    </div>

    {!tech&&<div style={{background:th.navBg,backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)',borderTop:`1px solid ${th.border}`,padding:'10px 0 28px',display:'flex',justifyContent:'space-around',position:'relative',zIndex:10,transition:switching?'background 0.38s ease':'none'}}>
      {[{id:'home',label:'home',Icon:HomeIcon},{id:'stats',label:'stats',Icon:ChartIcon},{id:'screentime',label:'screentime',Icon:ShieldIcon}].map(({id,label,Icon})=>(
        <button key={id} className="nav-btn" onClick={()=>setTab(id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',padding:'4px 18px',position:'relative'}}>
          {id==='screentime'&&!isPrem&&<span style={{position:'absolute',top:'0px',right:'10px',width:'6px',height:'6px',borderRadius:'50%',background:'#a48ee8'}}/>}
          <Icon c={nc(id)} a={tab===id}/>
          <span style={{fontSize:'10px',letterSpacing:'0.05em',color:nc(id),fontWeight:tab===id?600:400,transition:'color 0.2s'}}>{label}</span>
        </button>
      ))}
    </div>}

    {showPrem&&<PremiumModal th={th} hasTrial={hasTr} onClose={()=>setShowPrem(false)} onTrial={handleTrial} onBuy={handleBuy}/>}
    {showRem&&<ReminderSheet th={th} reminder={data.reminder||{enabled:false,time:'08:00'}} onSave={r=>{update({...data,reminder:r});setShowRem(false);}} onClose={()=>setShowRem(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
